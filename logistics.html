<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>물류반장 김용준 · Warehouse Sorting King</title>
<style>
  :root{
    --bg0:#161311; --bg1:#211c18; --wall:#2b2320; --line:#3a2f28;
    --floor:#6b5540; --floor2:#5a4634; --shelf:#4a3626; --shelf-d:#31241a;
    --crate:#c99552; --crate-m:#a9773e; --crate-d:#7d5325;
    --target:#4fd18a; --gold:#ffcf4d; --accent:#33c6a6; --accent-d:#1c8f78;
    --ink:#f4ece2; --ink-dim:#b3a496; --panel:#241e1a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg0);
    font-family:"Segoe UI",system-ui,-apple-system,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    color:var(--ink);user-select:none;-webkit-user-select:none;touch-action:manipulation;}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;}
  .bgtex{position:fixed;inset:0;z-index:-1;
    background:radial-gradient(1100px 560px at 50% -10%, #2c2420, transparent 70%),
      repeating-linear-gradient(0deg, transparent 0 38px, rgba(0,0,0,.18) 38px 40px),
      repeating-linear-gradient(90deg, transparent 0 38px, rgba(0,0,0,.18) 38px 40px),
      linear-gradient(180deg,var(--bg1),var(--bg0));}
  .screen{position:absolute;inset:0;display:none;flex-direction:column;}
  .screen.show{display:flex;}

  /* language bar */
  .langbar{position:absolute;top:calc(10px + env(safe-area-inset-top));right:14px;display:flex;gap:7px;z-index:8;}
  .flagbtn{width:39px;height:26px;border-radius:6px;border:2px solid transparent;overflow:hidden;opacity:.5;cursor:pointer;padding:0;background:none;transition:transform .1s,opacity .15s,border-color .15s;box-shadow:0 2px 6px rgba(0,0,0,.4);}
  .flagbtn svg{width:100%;height:100%;display:block;}
  .flagbtn.active{opacity:1;border-color:var(--accent);}
  .flagbtn:active{transform:scale(.9);}

  /* intro */
  #intro{z-index:50;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;background:radial-gradient(circle at 50% 38%,#101a22,#05080c 72%);}
  #intro.leaving{animation:fadeOut .45s ease forwards;} @keyframes fadeOut{to{opacity:0;}}
  .intro-badge{width:min(48vw,190px);opacity:0;transform:scale(.62);animation:badgeIn .62s cubic-bezier(.2,1.4,.4,1) forwards .08s;}
  @keyframes badgeIn{0%{opacity:0;transform:scale(.62) rotate(-6deg);}62%{opacity:1;transform:scale(1.06) rotate(1deg);}100%{opacity:1;transform:scale(1) rotate(0);}}
  .intro-badge svg{width:100%;height:100%;display:block;animation:badgeGlow 1.8s ease-in-out infinite .7s;}
  @keyframes badgeGlow{0%,100%{filter:drop-shadow(0 0 8px rgba(60,180,220,.35));}50%{filter:drop-shadow(0 0 18px rgba(60,200,150,.7));}}
  .intro-word{margin-top:10px;opacity:0;transform:translateY(8px);animation:wordIn .5s ease forwards .38s;display:flex;gap:.28em;font-weight:900;letter-spacing:.02em;font-size:clamp(26px,7vw,40px);}
  @keyframes wordIn{to{opacity:1;transform:translateY(0);}}
  .intro-word .yj{background:linear-gradient(120deg,#2f7fe6,#26c0dd);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .intro-word .games{background:linear-gradient(120deg,#2bc48a,#57e08a);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .intro-tag{margin-top:6px;font-size:11px;letter-spacing:.42em;color:#7fa0ac;text-transform:uppercase;opacity:0;animation:wordIn .5s ease forwards .55s;}

  /* game logo */
  #gameLogo{align-items:center;justify-content:center;flex-direction:column;cursor:pointer;overflow:hidden;background:radial-gradient(circle at 50% 22%,#2c2420,#050d16 76%);}
  .gl-scene{position:absolute;inset:0;z-index:0;opacity:.9;} .gl-scene svg{width:100%;height:100%;display:block;}
  .gl-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:0 24px;text-align:center;opacity:0;transform:scale(.9);animation:glIn .55s cubic-bezier(.2,1.3,.4,1) forwards .1s;}
  @keyframes glIn{to{opacity:1;transform:scale(1);}}
  .gl-ribbon{display:inline-block;margin:0 auto 18px;padding:7px 22px;border-radius:20px;background:linear-gradient(180deg,#e08a2c,#b0641c);color:#fff;font-weight:800;font-size:13px;letter-spacing:.05em;box-shadow:0 4px 10px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.25);white-space:nowrap;}
  .gl-title{margin:0;font-size:clamp(30px,9vw,50px);font-weight:900;line-height:1.22;color:#ffe6b0;
    text-shadow:-2px -2px 0 #5a3410,2px -2px 0 #5a3410,-2px 2px 0 #5a3410,2px 2px 0 #5a3410,0 0 22px rgba(255,180,60,.5),0 8px 16px rgba(0,0,0,.55);letter-spacing:-.01em;max-width:340px;}
  .gl-mascot{width:min(38vw,158px);margin:14px auto 0;filter:drop-shadow(0 12px 14px rgba(0,0,0,.5));animation:glBob 2.2s ease-in-out infinite;}
  .gl-mascot svg{width:100%;height:100%;display:block;} @keyframes glBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
  .gl-sparkle{position:absolute;font-size:20px;opacity:.85;z-index:0;animation:glTw 1.8s ease-in-out infinite;filter:drop-shadow(0 0 6px rgba(255,220,150,.7));}
  .gl-sparkle.s1{top:16%;left:11%;}.gl-sparkle.s2{top:13%;right:10%;animation-delay:.5s;font-size:16px;}.gl-sparkle.s3{bottom:15%;left:14%;animation-delay:1s;font-size:14px;}
  @keyframes glTw{0%,100%{opacity:.3;transform:scale(.8);}50%{opacity:1;transform:scale(1.15);}}
  .gl-prompt{position:absolute;left:0;right:0;bottom:calc(46px + env(safe-area-inset-bottom));text-align:center;color:#ffe0b0;font-weight:800;font-size:14px;letter-spacing:.03em;z-index:1;animation:glPulse 1.3s ease-in-out infinite;}
  @keyframes glPulse{0%,100%{opacity:.4;}50%{opacity:1;}}

  /* main menu */
  #mainMenu{align-items:center;justify-content:center;overflow:hidden;}
  .mm-scene{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none;} .mm-scene svg{width:100%;height:100%;display:block;}
  .mm-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 22px;}
  .mm-kicker{font-size:clamp(14px,4vw,18px);font-weight:800;letter-spacing:.08em;color:#ffd75e;text-shadow:-1px -1px 0 #7a4a12,1px -1px 0 #7a4a12,-1px 1px 0 #7a4a12,1px 1px 0 #7a4a12,0 4px 10px rgba(0,0,0,.5);}
  .mm-title{margin-top:6px;font-size:clamp(32px,9.4vw,50px);font-weight:900;line-height:1.15;color:#ffe6b0;text-shadow:-2px -2px 0 #5a3410,2px -2px 0 #5a3410,-2px 2px 0 #5a3410,2px 2px 0 #5a3410,0 0 22px rgba(255,180,60,.5),0 8px 16px rgba(0,0,0,.55);}
  .mm-tag{margin-top:10px;font-size:13px;color:#e6d3bf;max-width:300px;text-shadow:0 1px 3px rgba(0,0,0,.6);}
  .mm-btns{display:flex;gap:10px;margin-top:24px;}
  .menu-btn{padding:13px 22px;font-weight:900;font-size:15px;cursor:pointer;transition:transform .1s;border:none;display:inline-flex;align-items:center;gap:7px;
    background:repeating-linear-gradient(90deg, rgba(0,0,0,.08) 0 2px, transparent 2px 16px),linear-gradient(180deg,#a9793f,#7d5325);
    border:2px solid #5a3818;border-radius:11px;color:#fff3dc;box-shadow:0 4px 0 #3d2510,0 7px 14px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.2);text-shadow:0 2px 2px rgba(0,0,0,.5);}
  .menu-btn.start{background:linear-gradient(180deg,var(--accent),var(--accent-d));border-color:#0c5563;color:#032822;font-size:17px;padding:13px 34px;}
  .menu-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #3d2510,0 4px 8px rgba(0,0,0,.5);}

  /* stage select */
  #select{overflow-y:auto;padding:0 16px 40px;-webkit-overflow-scrolling:touch;}
  #select .hud{padding-left:0;padding-right:0;}
  .tiers{max-width:520px;margin:14px auto 0;display:flex;gap:8px;background:#1c1713;border:1px solid var(--line);border-radius:16px;padding:6px;}
  .tier-tab{flex:1;padding:11px 4px;border:none;border-radius:11px;background:none;color:var(--ink-dim);font-size:15px;font-weight:800;cursor:pointer;transition:background .18s,color .18s;display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.2;}
  .tier-tab .tsub{font-size:9.5px;letter-spacing:.12em;opacity:.75;font-weight:700;}
  .tier-tab.active{background:linear-gradient(180deg,var(--accent),var(--accent-d));color:#032822;}
  .stages{max-width:560px;margin:16px auto 0;display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
  @media(max-width:400px){.stages{grid-template-columns:repeat(4,1fr);}}
  .stage-btn{position:relative;aspect-ratio:1;border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,#2c2420,#211b17);color:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-weight:800;cursor:pointer;transition:transform .1s;box-shadow:0 4px 10px rgba(0,0,0,.3);}
  .stage-btn .num{font-size:20px;} .stage-btn .lab{font-size:8.5px;letter-spacing:.14em;color:var(--ink-dim);text-transform:uppercase;}
  .stage-btn:not(.locked):active{transform:scale(.94);}
  .stage-btn.locked{opacity:.5;cursor:not-allowed;color:var(--ink-dim);}
  .stage-btn.cleared{border-color:rgba(79,209,138,.6);} .stage-btn.cleared .num{color:#8ee9a9;}
  .stage-btn .stars{position:absolute;top:6px;right:8px;font-size:10px;color:var(--gold);}
  .stage-btn .lockic{font-size:18px;}
  .reset-prog{display:block;margin:24px auto 0;background:none;border:1px solid var(--line);color:var(--ink-dim);font-size:12px;padding:8px 16px;border-radius:20px;cursor:pointer;}

  /* hud */
  .hud{display:flex;align-items:center;gap:7px;padding:calc(12px + env(safe-area-inset-top)) 12px 6px;}
  .hud .iconbtn{width:40px;height:40px;flex:0 0 auto;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s;position:relative;}
  .hud .iconbtn:active{transform:scale(.9);} .hud .iconbtn:disabled{opacity:.35;cursor:default;}
  .hud .iconbtn svg{width:20px;height:20px;}
  .hud .iconbtn.restart-btn{width:48px;height:48px;border-radius:14px;} .hud .iconbtn.restart-btn svg{width:27px;height:27px;}
  .hud .center{flex:1;text-align:center;min-width:0;}
  .hud .stg{font-size:11px;letter-spacing:.16em;color:var(--accent);font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hud .prog{font-size:15px;font-weight:800;margin-top:1px;} .hud .prog .done{color:var(--target);}

  /* board */
  #game .hud,#game .board-wrap,#game .pad-wrap{position:relative;z-index:1;}
  .scene{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none;} .scene svg{width:100%;height:100%;display:block;}
  .board-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:6px 14px;min-height:0;}
  .board{position:relative;width:min(94vw,60vh);max-width:520px;aspect-ratio:1;background:var(--wall);border:3px solid #17110d;border-radius:12px;box-shadow:0 20px 46px rgba(0,0,0,.6),0 0 0 1px rgba(0,0,0,.4),inset 0 0 0 2px rgba(255,255,255,.03);display:grid;gap:0;overflow:hidden;padding:4px;}
  .cell{position:relative;border:1px solid rgba(0,0,0,.22);overflow:hidden;}
  .cell.floor{background:radial-gradient(6px 5px at 30% 40%, rgba(30,20,10,.4), transparent 60%),linear-gradient(135deg,var(--floor),var(--floor2));}
  .cell.wall{background:linear-gradient(180deg,var(--shelf),var(--shelf-d));}
  .cell.wall::before{content:"";position:absolute;inset:6%;border-radius:3px;background:linear-gradient(180deg,#5c4531,#3a2b1d);border:2px solid #241a10;box-shadow:inset 0 0 0 2px rgba(255,255,255,.05);}
  .cell.wall::after{content:"";position:absolute;left:6%;right:6%;top:32%;height:8%;background:rgba(0,0,0,.35);}
  .cell.target::after{content:"";position:absolute;left:24%;top:24%;width:52%;height:52%;border-radius:50%;border:3px dashed var(--target,#4fd18a);box-shadow:0 0 10px var(--target,#4fd18a),inset 0 0 8px var(--target,#4fd18a);animation:tgpulse 1.4s ease-in-out infinite;}
  @keyframes tgpulse{0%,100%{opacity:.55;transform:scale(.9);}50%{opacity:1;transform:scale(1.05);}}

  /* crate + player as absolute sprites */
  .sprite{position:absolute;pointer-events:none;transition:left .12s ease, top .12s ease;}
  .crate{z-index:4;transform:translate(-50%,-52%);}
  .crate svg{width:100%;height:100%;display:block;filter:drop-shadow(0 4px 4px rgba(0,0,0,.45));}
  .crate.on .glow{opacity:1;}
  .glow{opacity:0;transition:opacity .2s;}
  .player{z-index:5;transform:translate(-50%,-58%);}
  .player svg{width:100%;height:100%;display:block;filter:drop-shadow(0 4px 3px rgba(0,0,0,.45));}
  .player.flip{transform:translate(-50%,-58%) scaleX(-1);}
  .player.step{animation:step .12s ease;} @keyframes step{0%,100%{}50%{margin-top:-3px;}}
  .cell.bump{animation:bump .28s;} @keyframes bump{0%,100%{filter:none;}50%{filter:brightness(1.35) saturate(1.3);}}
  .pop{animation:pop .3s ease;} @keyframes pop{0%{transform:translate(-50%,-52%) scale(1);}45%{transform:translate(-50%,-54%) scale(1.12);}100%{transform:translate(-50%,-52%) scale(1);}}

  /* d-pad */
  .pad-wrap{display:flex;justify-content:center;padding:6px 0 calc(16px + env(safe-area-inset-bottom));}
  .dpad{display:grid;grid-template-columns:72px 72px 72px;grid-template-rows:72px 72px 72px;gap:7px;}
  .dbtn{border:none;cursor:pointer;border-radius:16px;touch-action:none;user-select:none;background:linear-gradient(180deg,#41362e,#241d18);color:var(--ink);font-size:30px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 0 #140f0b,0 8px 14px rgba(0,0,0,.4);transition:transform .06s,box-shadow .06s;}
  .dbtn:active{transform:translateY(4px);box-shadow:0 1px 0 #140f0b,0 3px 8px rgba(0,0,0,.4);}
  .dbtn.up{grid-column:2;grid-row:1;}.dbtn.left{grid-column:1;grid-row:2;}.dbtn.right{grid-column:3;grid-row:2;}.dbtn.down{grid-column:2;grid-row:3;}

  /* overlays */
  .overlay{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;padding:20px;} .overlay.show{display:flex;}
  .veil{position:absolute;inset:0;background:rgba(6,4,3,.72);backdrop-filter:blur(3px);}
  .card{position:relative;width:min(420px,92vw);max-height:90vh;overflow-y:auto;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:26px 22px;text-align:center;box-shadow:0 30px 70px rgba(0,0,0,.6);}
  .card h2{margin:6px 0 4px;font-size:25px;} .card p{color:var(--ink-dim);font-size:14px;margin:0 0 6px;}
  .card .big{font-size:52px;line-height:1;margin-bottom:6px;} .card .stars-big{font-size:30px;letter-spacing:6px;color:var(--gold);margin:8px 0 4px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4));}
  .btns{display:flex;gap:10px;margin-top:18px;} .btn{flex:1;padding:13px 10px;border-radius:13px;border:none;font-weight:800;font-size:15px;cursor:pointer;transition:transform .1s;} .btn:active{transform:scale(.96);}
  .btn.primary{background:linear-gradient(180deg,var(--accent),var(--accent-d));color:#032822;} .btn.ghost{background:#2f2721;color:var(--ink);border:1px solid var(--line);}
  .howlist{text-align:left;margin:14px 0 4px;font-size:14px;line-height:1.65;color:var(--ink-dim);} .howlist .row{display:flex;gap:11px;align-items:flex-start;margin-bottom:11px;} .howlist .ic{font-size:19px;line-height:1.4;flex:0 0 auto;} .howlist b{color:var(--ink);}
  .toast{position:fixed;left:50%;bottom:calc(200px + env(safe-area-inset-bottom));transform:translateX(-50%);background:rgba(20,15,11,.94);border:1px solid var(--line);color:var(--ink);padding:9px 16px;border-radius:20px;font-size:13.5px;font-weight:700;z-index:25;max-width:90vw;text-align:center;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;} .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
</style>
</head>
<body>
<div class="bgtex"></div>
<div id="app">
  <section id="intro" class="screen show">
    <div class="intro-badge" id="introBadge"></div>
    <div class="intro-word"><span class="yj">YJ</span><span class="games">GAMES</span></div>
    <div class="intro-tag">PRESENTS</div>
  </section>

  <section id="gameLogo" class="screen">
    <div class="gl-scene" id="glScene"></div>
    <div class="langbar"></div>
    <div class="gl-content">
      <div class="gl-ribbon" id="glRibbon">착착착! 창고 정리 액션</div>
      <h1 class="gl-title" id="glTitle">물류반장 김용준</h1>
      <div class="gl-mascot" id="glMascot"></div>
      <div class="gl-sparkle s1">📦</div><div class="gl-sparkle s2">✨</div><div class="gl-sparkle s3">📦</div>
    </div>
    <div class="gl-prompt" id="glPrompt">아무 버튼이나 눌러주세요</div>
  </section>

  <section id="mainMenu" class="screen">
    <div class="mm-scene" id="mmScene"></div>
    <div class="langbar"></div>
    <div class="mm-content">
      <div class="mm-kicker" id="mmKicker">착착착! 창고 정리 액션</div>
      <div class="mm-title" id="mmTitle">물류반장 김용준</div>
      <div class="mm-tag" id="mmTag">상자를 밀어서 제자리(초록 표시)에 착착 정리하자!</div>
      <div class="mm-btns"><button class="menu-btn" id="howtoBtn">❓ 게임 방법</button><button class="menu-btn start" id="startBtn">START</button></div>
    </div>
  </section>

  <section id="select" class="screen">
    <div class="hud"><button class="iconbtn" id="selBackBtn">←</button><div class="center"><div class="stg" id="selTitle">스테이지 선택</div></div></div>
    <div class="langbar"></div>
    <div class="tiers" id="tierTabs"></div>
    <div class="stages" id="stageGrid"></div>
    <button class="reset-prog" id="resetProg">진행 기록 초기화</button>
  </section>

  <section id="game" class="screen">
    <div class="scene" id="scene"></div>
    <div class="hud">
      <button class="iconbtn" id="backBtn">←</button>
      <div class="center"><div class="stg" id="hudStage"></div><div class="prog" id="hudProg"></div></div>
      <button class="iconbtn" id="undoBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 20 V11 a5 5 0 0 1 10 0 V20"/><path d="M13 16 l4 4 4 -4"/></svg></button>
      <button class="iconbtn restart-btn" id="restartBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 1 2.64 6.36"/><path d="M3 21v-6h6"/></svg></button>
    </div>
    <div class="board-wrap"><div class="board" id="board"></div></div>
    <div class="pad-wrap"><div class="dpad">
      <button class="dbtn up" data-dir="up">▲</button><button class="dbtn left" data-dir="left">◀</button>
      <button class="dbtn right" data-dir="right">▶</button><button class="dbtn down" data-dir="down">▼</button>
    </div></div>
  </section>
</div>

<div class="overlay" id="howtoOverlay"><div class="veil"></div><div class="card">
  <h2 id="howtoTitle">게임 방법</h2>
  <div class="howlist" id="howtoList"></div>
  <div class="btns"><button class="btn primary" id="howtoClose">닫기</button></div>
</div></div>

<div class="overlay" id="winOverlay"><div class="veil"></div><div class="card">
  <div class="big">📦✨📦</div><h2 id="winTitle">정리 완료!</h2>
  <div class="stars-big" id="winStars">★★★</div><p id="winMsg"></p>
  <div class="btns"><button class="btn ghost" id="winRetry">다시</button><button class="btn primary" id="winNext">다음 →</button></div>
</div></div>

<div class="toast" id="toast"></div>

<script>
"use strict";
(function(){
  const $=s=>document.querySelector(s);
  const TIERS=["beginner","intermediate","advanced","master"];
  const STAGES=30, PROG_KEY="logisticsKim.progress.v1", LANG_KEY="logisticsKim.lang.v1";

  /* ---------------- i18n (한국어 / 中文 / English / Tiếng Việt) ---------------- */
  const I18N={
    ko:{

    master:      {sizes:[13,14,15], boxes:[10,16],wall:[0.14,0.21], colors:[4,5], scr:[28,46]}
  };
  function cfg(tier,n){
    const b=BANDS[tier], band=Math.min(2,Math.floor((n-1)/10)), tt=(n-1)/(STAGES-1);
    const lerp=(a)=>Math.round(a[0]+(a[1]-a[0])*tt);
    const boxes=lerp(b.boxes);
    const colors=Math.max(1,Math.min(boxes,lerp(b.colors),PAL.length-1));
    return {size:b.sizes[band], boxes, colors, wallRatio:b.wall[0]+(b.wall[1]-b.wall[0])*tt,
      scrMul:b.scr[0]+(b.scr[1]-b.scr[0])*tt, tt, seed:(((TIERS.indexOf(tier)*149+n)>>>0)*2654435761)>>>0};
  }
  const DV={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]}, DL=["up","down","left","right"];
  const OPP={up:"down",down:"up",left:"right",right:"left"};

  function generateStage(tier,n){
    const c=cfg(tier,n), size=c.size, N=size*size, idx=(x,y)=>y*size+x;
    const inb=(x,y)=>x>=0&&y>=0&&x<size&&y<size;
    const K=c.boxes, nc=c.colors;
    // colors assigned round-robin so every color has ≥1 crate (index 0 only when single-color)
    const colorOf=(i)=> nc===1 ? 0 : (1 + (i % nc));
    // difficulty gates (grow within a tier)
    const minPush=Math.max(K*2, Math.round(K*(3+3*c.tt)));
    const minDisp=Math.max(K*2, Math.round(K*(3+2*c.tt)));
    let best=null,bestScore=-1;
    for(let attempt=0;attempt<220;attempt++){
      const rng=mulberry32((c.seed^((attempt*0x9E3779B1)>>>0))>>>0);
      // 1) walls: border + interior obstacles (some grown into pillars/nooks), keep largest floor
      const grid=new Array(N).fill("floor");
      for(let x=0;x<size;x++){grid[idx(x,0)]="wall";grid[idx(x,size-1)]="wall";}
      for(let y=0;y<size;y++){grid[idx(0,y)]="wall";grid[idx(size-1,y)]="wall";}
      let want=Math.round((size-2)*(size-2)*c.wallRatio),g=0;
      while(want>0&&g++<900){
        let x=1+((rng()*(size-2))|0),y=1+((rng()*(size-2))|0);
        if(grid[idx(x,y)]!=="floor")continue;
        grid[idx(x,y)]="wall";want--;
        // grow a short wall segment to form pillars, nooks & dead-ends (real obstacles)
        if(rng()<0.5){const len=1+((rng()*2)|0),dir=DL[(rng()*4)|0];
          for(let s=0;s<len&&want>0;s++){x+=DV[dir][0];y+=DV[dir][1];if(x>0&&y>0&&x<size-1&&y<size-1&&grid[idx(x,y)]==="floor"){grid[idx(x,y)]="wall";want--;}else break;}}
      }
      const seen=new Array(N).fill(false); let bestComp=[];
      for(let y=0;y<size;y++)for(let x=0;x<size;x++){ if(grid[idx(x,y)]==="floor"&&!seen[idx(x,y)]){
        const comp=[],st=[[x,y]];seen[idx(x,y)]=true;
        while(st.length){const [cx,cy]=st.pop();comp.push([cx,cy]);for(const d of DL){const nx=cx+DV[d][0],ny=cy+DV[d][1];if(inb(nx,ny)&&grid[idx(nx,ny)]==="floor"&&!seen[idx(nx,ny)]){seen[idx(nx,ny)]=true;st.push([nx,ny]);}}}
        if(comp.length>bestComp.length)bestComp=comp; }}
      const inComp=new Set(bestComp.map(([x,y])=>x+","+y));
      for(let i=0;i<N;i++){const x=i%size,y=(i/size)|0;if(grid[i]==="floor"&&!inComp.has(x+","+y))grid[i]="wall";}
      const floors=bestComp.slice();
      if(floors.length < K*3+4) continue;
      // 2) solved state: K targets, a crate (with identity+color) on each, player on free floor
      const shuffled=floors.slice().sort(()=>rng()-0.5);
      const tpos=shuffled.slice(0,K).map(([x,y])=>({x,y}));
      const targets=tpos.map((t,i)=>({x:t.x,y:t.y,c:colorOf(i)}));
      const boxMap=new Map(); // "x,y" -> {id,c}
      tpos.forEach((t,i)=>boxMap.set(t.x+","+t.y,{id:i,c:colorOf(i)}));
      let ppos=null; for(const [x,y] of shuffled){ if(!boxMap.has(x+","+y)){ppos={x,y};break;} }
      if(!ppos) continue;
      // 3) deep reverse scramble with focused dragging (runs of same-direction pulls)
      const hasBox=(x,y)=>boxMap.has(x+","+y);
      const isFloor=(x,y)=>inb(x,y)&&grid[idx(x,y)]==="floor";
      const empty=(x,y)=>isFloor(x,y)&&!hasBox(x,y);
      const canPull=(d)=>{const e=DV[d];return empty(ppos.x-e[0],ppos.y-e[1])&&hasBox(ppos.x+e[0],ppos.y+e[1]);};
      const canWalk=(d)=>{const e=DV[d];return empty(ppos.x+e[0],ppos.y+e[1]);};
      const applyPull=(d)=>{const e=DV[d];const b=boxMap.get((ppos.x+e[0])+","+(ppos.y+e[1]));boxMap.delete((ppos.x+e[0])+","+(ppos.y+e[1]));boxMap.set(ppos.x+","+ppos.y,b);ppos={x:ppos.x-e[0],y:ppos.y-e[1]};};
      const applyWalk=(d)=>{const e=DV[d];ppos={x:ppos.x+e[0],y:ppos.y+e[1]};};
      const applied=[]; const target=Math.max(K*3,Math.round(K*c.scrMul)); let curDir=null,guard=0;
      while(applied.length<target && guard++<target*14){
        if(curDir && canPull(curDir) && rng()<0.82){ applyPull(curDir); applied.push({type:"pull",dir:curDir}); continue; }
        const pulls=DL.filter(canPull), walks=DL.filter(canWalk);
        if(pulls.length && (!walks.length || rng()<0.68)){ curDir=pulls[(rng()*pulls.length)|0]; applyPull(curDir); applied.push({type:"pull",dir:curDir}); }
        else if(walks.length){ curDir=null; const w=walks[(rng()*walks.length)|0]; applyWalk(w); applied.push({type:"walk",dir:w}); }
        else break;
      }
      // 4) evaluate — all crates must be off their target and moved a real distance
      let offTarget=0,disp=0;
      const cells=[...boxMap.entries()].map(([k,v])=>{const [x,y]=k.split(",").map(Number);const t=tpos[v.id];const d=Math.abs(x-t.x)+Math.abs(y-t.y);disp+=d;if(d>0)offTarget++;return {x,y,c:v.c,id:v.id};});
      const solution=[]; for(let i=applied.length-1;i>=0;i--){const a=applied[i];solution.push(a.type==="pull"?a.dir:OPP[a.dir]);}
      const pushes=applied.filter(a=>a.type==="pull").length;
      const boxesArr=new Array(K); cells.forEach(cl=>boxesArr[cl.id]=[cl.x,cl.y,cl.c]);
      const cand={size,grid,boxes:boxesArr,targets:targets.map(t=>[t.x,t.y,t.c]),player:{...ppos},solution,offTarget,pushes,disp};
      if(offTarget===K && pushes>=minPush && disp>=minDisp) return cand;
      const score=offTarget*1000+Math.min(pushes,minPush)*4+Math.min(disp,minDisp);
      if(score>bestScore){bestScore=score;best=cand;}
    }
    return best;
  }

  /* ---------- progress / sound ---------- */
  function fresh(){const p={};TIERS.forEach(t=>p[t]={unlocked:1,stars:{}});return p;}
  function load(){try{const r=localStorage.getItem(PROG_KEY);if(r){const p=JSON.parse(r);TIERS.forEach(t=>{if(!p[t])p[t]={unlocked:1,stars:{}};});return p;}}catch(e){}return fresh();}
  function save(){try{localStorage.setItem(PROG_KEY,JSON.stringify(progress));}catch(e){}}
  let progress=load();
  let actx=null;
  function tone(f,d,type,v){try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.type=type||"sine";o.frequency.value=f;g.gain.value=v||0.05;o.connect(g);g.connect(actx.destination);const t=actx.currentTime;o.start(t);g.gain.exponentialRampToValueAtTime(0.0001,t+(d||0.09));o.stop(t+(d||0.09));}catch(e){}}
  function sfxPush(){tone(150,0.09,"square",0.045);setTimeout(()=>tone(120,0.08,"square",0.04),40);}
  const sfxStep=()=>tone(320,0.04,"sine",0.03);
  const sfxSet=()=>{tone(660,0.09,"triangle",0.05);setTimeout(()=>tone(990,0.12,"triangle",0.05),80);};
  const sfxBump=()=>tone(110,0.1,"square",0.05);
  const sfxWin=()=>[523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,0.16,"triangle",0.06),i*110));

  /* ---------- screens ---------- */
  const SCR={intro:$("#intro"),gameLogo:$("#gameLogo"),mainMenu:$("#mainMenu"),select:$("#select"),game:$("#game")};
  function showScreen(w){for(const k in SCR)SCR[k].classList.toggle("show",k===w);}
  const board=$("#board");
  let curTier="beginner", cur=null, busy=false;
  const key=(x,y)=>x+","+y;

  function buildTabs(){const wrap=$("#tierTabs");wrap.innerHTML="";TIERS.forEach(tr=>{const b=document.createElement("button");b.className="tier-tab"+(curTier===tr?" active":"");b.innerHTML=`<span>${tierName(tr)}</span><span class="tsub">${t("tierSub")}</span>`;b.addEventListener("click",()=>{curTier=tr;buildTabs();buildGrid();});wrap.appendChild(b);});}
  function buildGrid(){const grid=$("#stageGrid");grid.innerHTML="";const tp=progress[curTier];for(let n=1;n<=STAGES;n++){const locked=n>tp.unlocked,stars=tp.stars[n]||0;const btn=document.createElement("button");btn.className="stage-btn"+(locked?" locked":"")+(stars?" cleared":"");btn.innerHTML=locked?`<span class="lockic">🔒</span><span class="lab">${t("stageWord")} ${String(n).padStart(2,"0")}</span>`:`${stars?`<span class="stars">${"★".repeat(stars)}</span>`:""}<span class="num">${String(n).padStart(2,"0")}</span><span class="lab">${t("stageWord")}</span>`;if(!locked)btn.addEventListener("click",()=>startStage(curTier,n));grid.appendChild(btn);}}

  /* ---------------- language UI ---------------- */
  function buildLangBar(){document.querySelectorAll(".langbar").forEach(bar=>{bar.innerHTML="";LANGS.forEach(lc=>{const b=document.createElement("button");b.className="flagbtn"+(lang===lc?" active":"");b.innerHTML=FLAGS[lc];b.title=lc.toUpperCase();b.addEventListener("click",()=>setLang(lc));bar.appendChild(b);});});}
  function setLang(lc){lang=lc;try{localStorage.setItem(LANG_KEY,lc);}catch(e){}document.documentElement.lang=lc;buildLangBar();renderStatic();buildHowto();buildTabs();buildGrid();if(SCR.game.classList.contains("show"))updateHud();}
  function renderStatic(){
    $("#glRibbon").textContent=t("ribbon");$("#glTitle").textContent=t("title");$("#glPrompt").textContent=t("pressStart");
    $("#mmKicker").textContent=t("ribbon");$("#mmTitle").textContent=t("title");$("#mmTag").textContent=t("tag");
    $("#howtoBtn").textContent="❓ "+t("howto");$("#startBtn").textContent=t("start");
    $("#selTitle").textContent=t("stageSelect");$("#resetProg").textContent=t("reset");
    $("#howtoTitle").textContent=t("howtoTitle");$("#howtoClose").textContent=t("close");
    $("#winTitle").textContent=t("winTitle");$("#winRetry").textContent=t("retry");
  }
  function buildHowto(){const box=$("#howtoList");box.innerHTML=t("how").map(([ic,txt])=>`<div class="row"><span class="ic">${ic}</span><div>${txt}</div></div>`).join("");}

  let toastT=null;
  function toast(m){const el=$("#toast");el.textContent=m;el.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove("show"),1300);}

  /* ---------- start / render ---------- */
  function startStage(tier,n){
    const data=generateStage(tier,n);
    const boxAt=new Map(); // "x,y" -> id
    const boxPos={},boxColor={}; data.boxes.forEach((b,i)=>{boxPos[i]={x:b[0],y:b[1]};boxColor[i]=b[2]||0;boxAt.set(key(b[0],b[1]),i);});
    const targetColor=new Map(data.targets.map(t=>[key(t[0],t[1]),t[2]||0]));
    cur={tier,stage:n,data,size:data.size,player:{...data.player},boxAt,boxPos,boxColor,
      targets:new Set(data.targets.map(t=>key(t[0],t[1]))),targetColor,
      history:[],pushes:0,pengEl:null,boxEls:{}};
    renderBoard();updateHud();showScreen("game");$("#winOverlay").classList.remove("show");
  }
  function renderBoard(){
    const {data,size}=cur;
    $("#scene").innerHTML=whSVG();
    board.style.gridTemplateColumns=`repeat(${size},1fr)`;board.innerHTML="";
    for(let y=0;y<size;y++)for(let x=0;x<size;x++){
      const t=data.grid[y*size+x];const cell=document.createElement("div");
      const isT=cur.targets.has(key(x,y));
      cell.className="cell "+(t==="wall"?"wall":"floor")+(isT?" target":"");
      if(isT)cell.style.setProperty("--target",PAL[cur.targetColor.get(key(x,y))||0].glow);
      board.appendChild(cell);
    }
    const cp=100/size;
    // crates
    cur.boxEls={};
    Object.keys(cur.boxPos).forEach(id=>{
      const el=document.createElement("div");el.className="sprite crate";el.innerHTML=crateSVG(cur.boxColor[id]);
      el.style.width=(cp*0.86)+"%";el.style.height=(cp*0.86)+"%";
      board.appendChild(el);cur.boxEls[id]=el;positionSprite(el,cur.boxPos[id],0.5);refreshCrate(id);
    });
    // player
    const p=document.createElement("div");p.className="sprite player";p.innerHTML=WORKER;
    p.style.width=(cp*0.9)+"%";p.style.height=(cp*1.12)+"%";board.appendChild(p);cur.pengEl=p;positionSprite(p,cur.player,0.58);
  }
  function positionSprite(el,pos,yoff){const cp=100/cur.size;el.style.left=(cp*(pos.x+0.5))+"%";el.style.top=(cp*(pos.y+yoff))+"%";}
  function onMatch(id){const p=cur.boxPos[id];return cur.targetColor.get(key(p.x,p.y))===cur.boxColor[id];}
  function refreshCrate(id){cur.boxEls[id].classList.toggle("on",onMatch(id));}
  function updateHud(){
    let onT=0;for(const id in cur.boxPos){if(onMatch(id))onT++;}
    $("#hudStage").textContent=`${tierName(cur.tier)} · ${t("stageWord")} ${String(cur.stage).padStart(2,"0")}`;
    $("#hudProg").innerHTML=`<span class="done">${onT}</span> / ${cur.data.boxes.length} ${t("sorted")}`;
    $("#undoBtn").disabled=cur.history.length===0;
  }

  /* ---------- move ---------- */
  function move(dir){
    if(!cur||busy)return; if($("#winOverlay").classList.contains("show"))return;
    const [dx,dy]=DV[dir];const {data,size}=cur;
    if(dir==="left")cur.pengEl.classList.add("flip");else if(dir==="right")cur.pengEl.classList.remove("flip");
    const nx=cur.player.x+dx,ny=cur.player.y+dy;
    const inb=(x,y)=>x>=0&&y>=0&&x<size&&y<size;
    if(!inb(nx,ny)||data.grid[ny*size+nx]==="wall"){sfxBump();return;}
    const boxId=cur.boxAt.get(key(nx,ny));
    if(boxId!==undefined){
      // try to push
      const bx=nx+dx,by=ny+dy;
      if(!inb(bx,by)||data.grid[by*size+bx]==="wall"||cur.boxAt.has(key(bx,by))){sfxBump();const c=cur.pengEl;c.classList.remove("step");void c.offsetWidth;c.classList.add("step");toast(t("tBlocked"));return;}
      // push
      cur.history.push({type:"push",dir,pp:{...cur.player},boxId,bp:{x:nx,y:ny}});
      cur.boxAt.delete(key(nx,ny));cur.boxPos[boxId]={x:bx,y:by};cur.boxAt.set(key(bx,by),boxId);
      cur.player={x:nx,y:ny};
      positionSprite(cur.boxEls[boxId],cur.boxPos[boxId],0.5);positionSprite(cur.pengEl,cur.player,0.58);
      refreshCrate(boxId);const wasOn=onMatch(boxId);
      const el=cur.boxEls[boxId];el.classList.remove("pop");void el.offsetWidth;el.classList.add("pop");
      sfxPush();if(wasOn)setTimeout(sfxSet,60);
      cur.pushes++;updateHud();
      if(checkWin())return;
    } else {
      cur.history.push({type:"walk",dir,pp:{...cur.player}});
      cur.player={x:nx,y:ny};positionSprite(cur.pengEl,cur.player,0.58);sfxStep();
      const c=cur.pengEl;c.classList.remove("step");void c.offsetWidth;c.classList.add("step");updateHud();
    }
  }
  function checkWin(){
    for(const id in cur.boxPos){if(!onMatch(id))return false;}
    onWin();return true;
  }
  function undo(){
    if(!cur||busy||!cur.history.length)return;const h=cur.history.pop();
    if(h.type==="push"){const id=h.boxId;const cp=cur.boxPos[id];cur.boxAt.delete(key(cp.x,cp.y));cur.boxPos[id]={...h.bp};cur.boxAt.set(key(h.bp.x,h.bp.y),id);positionSprite(cur.boxEls[id],cur.boxPos[id],0.5);refreshCrate(id);}
    cur.player={...h.pp};positionSprite(cur.pengEl,cur.player,0.58);updateHud();
  }
  function onWin(){
    busy=true;sfxWin();
    const stars=cur.history.filter(h=>h.type==="push").length<=cur.data.solution.length+2?3:cur.history.length<=cur.data.solution.length*2?2:1;
    // simpler star: base on undo count
    const tp=progress[cur.tier];const st=3; tp.stars[cur.stage]=Math.max(tp.stars[cur.stage]||0,st);
    if(cur.stage>=tp.unlocked&&cur.stage<STAGES)tp.unlocked=cur.stage+1;
    save();buildGrid();
    const isLast=cur.stage>=STAGES;
    $("#winStars").textContent="★★★";
    $("#winMsg").textContent=isLast?t("winLast"):t("winMsg");
    $("#winNext").textContent=isLast?t("toMenu"):t("next");
    setTimeout(()=>{$("#winOverlay").classList.add("show");busy=false;},450);
  }

  /* ---------- input ---------- */
  document.addEventListener("keydown",(e)=>{const k=e.key,cf=k==="Enter"||k===" ",es=k==="Escape";
    if(SCR.gameLogo.classList.contains("show")){e.preventDefault();showScreen("mainMenu");return;}
    if($("#howtoOverlay").classList.contains("show")){if(cf||es){e.preventDefault();$("#howtoOverlay").classList.remove("show");}return;}
    if($("#winOverlay").classList.contains("show")){if(cf){e.preventDefault();$("#winNext").click();}return;}
    if(SCR.game.classList.contains("show")){if(es){e.preventDefault();showScreen("select");return;}const m={ArrowUp:"up",ArrowDown:"down",ArrowLeft:"left",ArrowRight:"right",w:"up",s:"down",a:"left",d:"right",W:"up",S:"down",A:"left",D:"right"};if(m[k]){e.preventDefault();move(m[k]);}else if(k==="z"||k==="Z"||k==="Backspace"){e.preventDefault();undo();}}});
  document.querySelectorAll(".dbtn").forEach(b=>b.addEventListener("pointerdown",(e)=>{e.preventDefault();move(b.dataset.dir);}));
  let ts=null;
  SCR.game.addEventListener("touchstart",(e)=>{if(e.target.closest(".dpad")){ts=null;return;}const t=e.changedTouches[0];ts={x:t.clientX,y:t.clientY};},{passive:true});
  SCR.game.addEventListener("touchend",(e)=>{if(!ts)return;const t=e.changedTouches[0];const dx=t.clientX-ts.x,dy=t.clientY-ts.y,ax=Math.abs(dx),ay=Math.abs(dy);ts=null;if(Math.max(ax,ay)<20)return;if(ax>ay)move(dx>0?"right":"left");else move(dy>0?"down":"up");},{passive:true});

  /* ---------- buttons ---------- */
  $("#backBtn").addEventListener("click",()=>{$("#winOverlay").classList.remove("show");showScreen("select");});
  $("#restartBtn").addEventListener("click",()=>{if(cur)startStage(cur.tier,cur.stage);});
  $("#undoBtn").addEventListener("click",undo);
  $("#howtoBtn").addEventListener("click",()=>$("#howtoOverlay").classList.add("show"));
  $("#howtoClose").addEventListener("click",()=>$("#howtoOverlay").classList.remove("show"));
  $("#howtoOverlay").addEventListener("click",(e)=>{if(e.target.classList.contains("veil"))$("#howtoOverlay").classList.remove("show");});
  $("#winNext").addEventListener("click",()=>{if(cur.stage>=STAGES){$("#winOverlay").classList.remove("show");showScreen("mainMenu");}else startStage(cur.tier,cur.stage+1);});
  $("#winRetry").addEventListener("click",()=>startStage(cur.tier,cur.stage));
  $("#startBtn").addEventListener("click",()=>showScreen("select"));
  $("#selBackBtn").addEventListener("click",()=>showScreen("mainMenu"));
  $("#gameLogo").addEventListener("click",()=>showScreen("mainMenu"));
  $("#resetProg").addEventListener("click",()=>{if(confirm(t("confirmReset"))){progress=fresh();save();buildGrid();}});

  /* ---------- intro ---------- */
  let introDone=false,introTimer=null;
  function finishIntro(){if(introDone)return;introDone=true;if(introTimer)clearTimeout(introTimer);const el=$("#intro");el.classList.add("leaving");setTimeout(()=>{el.classList.remove("show","leaving");showScreen("gameLogo");},450);}
  $("#intro").addEventListener("click",finishIntro,{once:true});introTimer=setTimeout(finishIntro,3000);

  /* ---------- boot ---------- */
  document.documentElement.lang=lang;
  buildLangBar();renderStatic();buildHowto();buildTabs();buildGrid();
  $("#introBadge").innerHTML=LOGO;$("#glMascot").innerHTML=WORKER;$("#glScene").innerHTML=whSVG();$("#mmScene").innerHTML=whSVG();
  window.__SOKO={generateStage,startStage,move,get cur(){return cur;},setLang};
})();
</script>
