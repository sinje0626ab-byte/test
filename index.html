<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>미화부장 김용준 · Chief Janitor Kim</title>
<style>
  :root{
    --bg0:#161311; --bg1:#211c18; --wall:#2b2320; --line:#3a2f28;
    --dirt:#6b5540; --dirt2:#5a4634;
    --crate:#a9773e; --crate-d:#7d5325; --crate-l:#c99552;
    --gold:#ffcf4d; --accent:#33c6a6; --accent-d:#1c8f78;
    --start:#f2a93b; --goal:#39c66a; --hint:#ffe14d;
    --ink:#f4ece2; --ink-dim:#b3a496; --panel:#241e1a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg0);
    font-family:"Segoe UI",system-ui,-apple-system,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    color:var(--ink);user-select:none;-webkit-user-select:none;touch-action:manipulation;}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;}

  .bgtex{position:fixed;inset:0;z-index:-1;
    background:
      radial-gradient(1200px 600px at 50% -10%, #2c2420, transparent 70%),
      repeating-linear-gradient(0deg, transparent 0 38px, rgba(0,0,0,.18) 38px 40px),
      repeating-linear-gradient(90deg, transparent 0 38px, rgba(0,0,0,.18) 38px 40px),
      linear-gradient(180deg,var(--bg1),var(--bg0));}

  .screen{position:absolute;inset:0;display:none;flex-direction:column;}
  .screen.show{display:flex;}

  /* ---------- language bar ---------- */
  .langbar{position:absolute;top:calc(10px + env(safe-area-inset-top));right:14px;display:flex;gap:7px;z-index:6;}
  .flagbtn{width:39px;height:26px;border-radius:6px;border:2px solid transparent;overflow:hidden;
    cursor:pointer;padding:0;background:none;opacity:.5;transition:opacity .15s, transform .1s, border-color .15s;
    box-shadow:0 2px 6px rgba(0,0,0,.4);line-height:0;}
  .flagbtn svg{width:100%;height:100%;display:block;}
  .flagbtn.active{opacity:1;border-color:var(--accent);}
  .flagbtn:active{transform:scale(.9);}

  /* ---------- stage select ---------- */
  #select{overflow-y:auto;padding:0 16px 40px;-webkit-overflow-scrolling:touch;}
  #select .hud{padding-left:0;padding-right:0;}
  #select .tiers{margin-top:14px;}
  .title-wrap{text-align:center;padding:30px 0 4px;}
  .kicker{font-size:12px;letter-spacing:.3em;color:var(--accent);font-weight:800;text-transform:uppercase;}
  .title{font-size:clamp(26px,7vw,44px);font-weight:900;letter-spacing:-.01em;margin:4px 0 2px;
    text-shadow:0 2px 0 #000, 0 0 26px rgba(51,198,166,.25);}
  .title .mop{filter:drop-shadow(0 3px 3px rgba(0,0,0,.5));}
  .subtitle{color:var(--ink-dim);font-size:14px;margin-top:2px;padding:0 10px;}
  .howto-btn{display:inline-flex;align-items:center;gap:7px;margin:16px auto 4px;
    background:var(--panel);border:1px solid var(--line);color:var(--ink);
    padding:10px 20px;border-radius:24px;font-size:14px;font-weight:800;cursor:pointer;
    box-shadow:0 4px 12px rgba(0,0,0,.3);transition:transform .1s,border-color .2s;}
  .howto-btn:hover{border-color:var(--accent);}
  .howto-btn:active{transform:scale(.96);}
  /* wood-plank sign styling shared by the main-menu buttons */
  .wood-btn{
    background:
      repeating-linear-gradient(90deg, rgba(0,0,0,.08) 0 2px, transparent 2px 16px),
      linear-gradient(180deg,#a9793f,#7d5325);
    border:2px solid #5a3818;border-radius:10px;
    box-shadow:0 4px 0 #3d2510, 0 7px 14px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.25);
    color:#fff3dc;text-shadow:0 2px 2px rgba(0,0,0,.5);}
  .wood-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #3d2510,0 4px 8px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.25);}

  /* tier tabs */
  .tiers{max-width:520px;margin:20px auto 0;display:flex;gap:8px;
    background:#1c1713;border:1px solid var(--line);border-radius:16px;padding:6px;}
  .tier-tab{flex:1;padding:11px 4px;border:none;border-radius:11px;background:none;color:var(--ink-dim);
    font-size:15px;font-weight:800;cursor:pointer;transition:background .18s,color .18s;display:flex;
    flex-direction:column;align-items:center;gap:2px;line-height:1.2;}
  .tier-tab .tsub{font-size:9.5px;letter-spacing:.12em;opacity:.75;font-weight:700;}
  .tier-tab.active{background:linear-gradient(180deg,var(--accent),var(--accent-d));color:#04211b;}

  .stages{max-width:560px;margin:16px auto 0;display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
  @media(max-width:400px){.stages{grid-template-columns:repeat(4,1fr);}}
  .stage-btn{position:relative;aspect-ratio:1;border:1px solid var(--line);border-radius:14px;
    background:linear-gradient(180deg,#2c2420,#211b17);color:var(--ink);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    font-weight:800;cursor:pointer;transition:transform .1s, box-shadow .2s, border-color .2s;
    box-shadow:0 4px 10px rgba(0,0,0,.3);}
  .stage-btn .num{font-size:20px;}
  .stage-btn .lab{font-size:8.5px;letter-spacing:.14em;color:var(--ink-dim);text-transform:uppercase;}
  .stage-btn:not(.locked):active{transform:scale(.94);}
  .stage-btn:not(.locked):hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 6px 16px rgba(0,0,0,.4);}
  .stage-btn.locked{opacity:.5;cursor:not-allowed;color:var(--ink-dim);}
  .stage-btn.cleared{border-color:rgba(57,198,106,.6);}
  .stage-btn.cleared .num{color:#8ee9a9;}
  .stage-btn .stars{position:absolute;top:6px;right:8px;font-size:10px;color:var(--gold);}
  .stage-btn .lockic{font-size:18px;}
  .reset-prog{display:block;margin:24px auto 0;background:none;border:1px solid var(--line);
    color:var(--ink-dim);font-size:12px;padding:8px 16px;border-radius:20px;cursor:pointer;}
  .reset-prog:active{transform:scale(.96);}

  /* ---------- game screen ---------- */
  .hud{display:flex;align-items:center;gap:7px;padding:calc(12px + env(safe-area-inset-top)) 12px 6px;}
  .hud .iconbtn{width:40px;height:40px;flex:0 0 auto;border-radius:12px;border:1px solid var(--line);
    background:var(--panel);color:var(--ink);font-size:18px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:transform .1s,border-color .2s;position:relative;}
  .hud .iconbtn:active{transform:scale(.9);}
  .hud .iconbtn:disabled{opacity:.35;cursor:default;}
  .hud .iconbtn svg{width:20px;height:20px;}
  .hud .center{flex:1;text-align:center;min-width:0;}
  .hud .stg{font-size:11px;letter-spacing:.16em;color:var(--accent);font-weight:800;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;}
  .hud .prog{font-size:15px;font-weight:800;margin-top:1px;}
  .hud .prog .done{color:var(--goal);}
  .hintbtn{background:linear-gradient(180deg,#4a3f1e,#2e2711)!important;border-color:#6b5a22!important;}
  .hintbtn .cnt{position:absolute;top:-5px;right:-5px;background:var(--gold);color:#3a2a00;font-size:10px;
    font-weight:900;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    padding:0 3px;box-shadow:0 1px 3px rgba(0,0,0,.5);}
  .hintbtn:disabled{filter:grayscale(.7);}

  .board-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:6px 14px;min-height:0;}
  .board{position:relative;width:min(94vw, 60vh);max-width:520px;aspect-ratio:1;
    background:var(--wall);border:3px solid #17110d;border-radius:12px;
    box-shadow:0 18px 40px rgba(0,0,0,.5), inset 0 0 0 2px rgba(255,255,255,.03);
    display:grid;gap:0;overflow:hidden;padding:4px;}
  .cell{position:relative;border:1px solid rgba(0,0,0,.28);overflow:hidden;}
  .cell.floor{
    background:
      radial-gradient(6px 5px at 24% 34%, rgba(60,44,18,.55), transparent 60%),
      radial-gradient(8px 7px at 72% 64%, rgba(22,14,7,.62), transparent 62%),
      radial-gradient(7px 6px at 46% 82%, rgba(46,58,26,.4), transparent 60%),
      radial-gradient(5px 4px at 82% 26%, rgba(20,14,8,.55), transparent 60%),
      linear-gradient(135deg,var(--dirt),var(--dirt2));}
  .cell.floor::after{content:"";position:absolute;inset:0;
    background:
      radial-gradient(1.6px 1.6px at 33% 52%, rgba(12,8,4,.75), transparent 62%),
      radial-gradient(1.6px 1.6px at 62% 38%, rgba(12,8,4,.7), transparent 62%),
      radial-gradient(1.4px 1.4px at 50% 68%, rgba(12,8,4,.7), transparent 62%),
      radial-gradient(10px 8px at 40% 74%, rgba(18,11,5,.45), transparent 62%);}
  /* cleaned floor - bright wood / parquet */
  .cell.clean{
    background:
      repeating-linear-gradient(92deg, rgba(120,75,30,.16) 0 1.5px, transparent 1.5px 13px),
      linear-gradient(120deg, rgba(255,255,255,.18), transparent 55%),
      linear-gradient(160deg,#f3dcac,#e7c586 68%,#dcb96f);
    box-shadow:inset 0 0 0 1px rgba(120,80,40,.16), inset 0 0 10px rgba(255,246,222,.4);
    animation:shine .5s ease-out;}
  .cell.clean::after{content:"";position:absolute;inset:0;
    background:linear-gradient(115deg,transparent 38%,rgba(255,255,255,.55) 50%,transparent 62%);
    opacity:0;animation:sweep .55s ease-out;}
  .cell.clean::before{content:"";position:absolute;left:12%;right:12%;bottom:14%;height:26%;
    border-radius:50%;background:radial-gradient(closest-side, rgba(255,255,255,.55), transparent 75%);
    opacity:0;animation:streak .5s ease-out;}
  @keyframes streak{0%{opacity:.8;transform:scaleX(.4);}100%{opacity:0;transform:scaleX(1.1);}}
  @keyframes sweep{0%{transform:translateX(-120%);opacity:.9;}100%{transform:translateX(120%);opacity:0;}}
  @keyframes shine{0%{filter:brightness(1.6);}100%{filter:brightness(1);}}
  .cell.crate{background:linear-gradient(180deg,var(--crate-l),var(--crate));}
  .cell.crate::before{content:"";position:absolute;inset:9%;border-radius:4px;
    background:linear-gradient(180deg,var(--crate-l),var(--crate) 60%,var(--crate-d));
    border:2px solid var(--crate-d);box-shadow:inset 0 0 0 2px rgba(255,255,255,.12), 0 3px 6px rgba(0,0,0,.4);}
  .cell.crate::after{content:"";position:absolute;inset:9%;border-radius:4px;
    background:linear-gradient(45deg,transparent 46%,var(--crate-d) 46% 54%,transparent 54%),
      linear-gradient(-45deg,transparent 46%,var(--crate-d) 46% 54%,transparent 54%);opacity:.55;}
  .cell .mark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    flex-direction:column;font-weight:900;pointer-events:none;z-index:2;}
  .cell .mark .tag{font-size:min(2.4vw,13px);letter-spacing:.06em;padding:1px 5px;border-radius:6px;line-height:1.3;}
  .cell.start .tag{color:#3a2410;background:var(--start);box-shadow:0 1px 4px rgba(0,0,0,.4);}
  .cell.goal .mark{justify-content:flex-end;}
  .cell.goal .door{position:absolute;top:2%;left:7%;width:86%;height:84%;display:block;z-index:2;}
  .cell.goal .door svg{width:100%;height:100%;filter:drop-shadow(0 3px 4px rgba(0,0,0,.5));}
  .cell.goal .tag{position:relative;z-index:3;margin-bottom:3%;
    color:#0d3b1e;background:var(--goal);box-shadow:0 1px 4px rgba(0,0,0,.4);}
  .cell.goal.ready{animation:goalpulse 1s ease-in-out infinite;}
  @keyframes goalpulse{0%,100%{box-shadow:inset 0 0 0 3px rgba(57,198,106,.4);}50%{box-shadow:inset 0 0 14px 4px rgba(57,198,106,.85);}}
  .cell.hint{animation:hintpulse .9s ease-in-out infinite;}
  @keyframes hintpulse{0%,100%{box-shadow:inset 0 0 0 3px rgba(255,225,77,.5);}50%{box-shadow:inset 0 0 16px 5px rgba(255,225,77,.95);}}
  .cell.bump{animation:bump .28s;}
  @keyframes bump{0%,100%{filter:none;}50%{filter:brightness(1.4) saturate(1.4);}}

  .player{position:absolute;z-index:5;pointer-events:none;transition:left .13s ease, top .13s ease;
    transform:translate(-50%,-62%);}
  .player svg{display:block;width:100%;height:100%;filter:drop-shadow(0 4px 3px rgba(0,0,0,.45));}
  .player.hop{animation:hop .13s ease;}
  @keyframes hop{0%,100%{transform:translate(-50%,-62%) scaleY(1);}45%{transform:translate(-50%,-70%) scaleY(1.05);}}
  .player.flip{transform:translate(-50%,-62%) scaleX(-1);}
  .player.flip.hop{animation:hopf .13s ease;}
  @keyframes hopf{0%,100%{transform:translate(-50%,-62%) scaleX(-1) scaleY(1);}45%{transform:translate(-50%,-70%) scaleX(-1) scaleY(1.05);}}
  .player svg .mopgroup{transform-box:fill-box;transform-origin:60% 6%;}
  .player.mopping svg .mopgroup{animation:mopwipe .5s ease-in-out;}
  /* 쓱-싹: two deliberate, clearly separated sweeps with a beat between */
  @keyframes mopwipe{
    0%{transform:rotate(0);}
    20%{transform:rotate(-27deg);}       /* stroke 1 apex */
    38%{transform:rotate(-4deg);}        /* return through center */
    50%{transform:rotate(-4deg);}        /* tiny hold - the "beat" */
    70%{transform:rotate(24deg);}        /* stroke 2 apex */
    88%{transform:rotate(2deg);}
    100%{transform:rotate(0);}}

  /* ---- clean burst particles ---- */
  .fx{position:absolute;left:50%;top:54%;pointer-events:none;z-index:6;}
  /* dust swept in the movement direction, arcing up then settling down */
  .fx-dust{border-radius:50%;transform:translate(-50%,-50%);animation:dust .58s ease-out forwards;}
  @keyframes dust{
    0%{opacity:.95;transform:translate(-50%,-50%) scale(1);}
    45%{opacity:.85;transform:translate(calc(-50% + var(--mx)),calc(-50% + var(--my))) scale(.95);}
    100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(.3);}}
  /* low dust cloud drifting the way you swept */
  .fx-cloud{width:72%;height:46%;left:50%;top:62%;border-radius:50%;
    background:radial-gradient(closest-side, rgba(150,120,80,.55), rgba(150,120,80,0) 72%);
    transform:translate(-50%,-50%) scale(.35);animation:cloud .5s ease-out forwards;}
  @keyframes cloud{0%{opacity:.7;transform:translate(-50%,-50%) scale(.35);}
    100%{opacity:0;transform:translate(calc(-50% + var(--cx)),calc(-50% + var(--cy))) scale(1.25);}}
  .fx-spark{font-size:min(4.6vw,20px);line-height:1;transform:translate(-50%,-50%) scale(.2);
    filter:drop-shadow(0 0 3px rgba(255,235,150,.9));animation:spark .56s ease-out forwards;}
  @keyframes spark{0%{opacity:0;transform:translate(-50%,-50%) scale(.2) rotate(-30deg);}
    35%{opacity:1;transform:translate(calc(-50% + var(--sx)),calc(-50% + var(--sy))) scale(1.15) rotate(12deg);}
    100%{opacity:0;transform:translate(calc(-50% + var(--sx)),calc(-50% + var(--sy) - 6px)) scale(.5) rotate(0);}}

  /* ---- room scene backdrop (behind the board) ---- */
  .scene{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  .scene svg{width:100%;height:100%;display:block;}
  #game .hud,#game .board-wrap,#game .pad-wrap{position:relative;z-index:1;}
  .board{box-shadow:0 20px 46px rgba(0,0,0,.62), 0 0 0 1px rgba(0,0,0,.4), inset 0 0 0 2px rgba(255,255,255,.03);}

  /* ---- clear cutscene: door swings open, player walks through ---- */
  .cell.goal{perspective:220px;}
  .cell.goal .door{transform-style:preserve-3d;transform-origin:8% 50%;}
  .cell.goal.opening .door{animation:doorOpen .55s ease-in forwards;}
  @keyframes doorOpen{0%{transform:rotateY(0deg);}100%{transform:rotateY(-108deg);filter:brightness(.75);}}
  .cell.goal.opening::after{content:"";position:absolute;inset:6%;z-index:1;border-radius:6px;
    background:radial-gradient(closest-side, rgba(255,248,214,.95), rgba(255,248,214,0) 72%);
    opacity:0;animation:doorGlow .55s ease-in forwards;}
  @keyframes doorGlow{0%{opacity:0;}60%{opacity:0;}100%{opacity:.9;}}
  .player.walkin{animation:walkIn .5s ease-in forwards;}
  @keyframes walkIn{0%{opacity:1;filter:brightness(1);}
    100%{opacity:0;transform:translate(-50%,-62%) scale(.55);filter:brightness(1.6);}}
  .player.walkin.flip{animation:walkInF .5s ease-in forwards;}
  @keyframes walkInF{0%{opacity:1;filter:brightness(1);}
    100%{opacity:0;transform:translate(-50%,-62%) scaleX(-1) scale(.55);filter:brightness(1.6);}}

  /* d-pad */
  .pad-wrap{display:flex;justify-content:center;padding:6px 0 calc(16px + env(safe-area-inset-bottom));}
  /* single-knob joystick: drag and hold to walk continuously */
  .joystick{position:relative;width:156px;height:156px;border-radius:50%;touch-action:none;user-select:none;
    background:radial-gradient(circle at 36% 30%,#2c231b,#15100b 74%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:inset 0 3px 10px rgba(0,0,0,.6), inset 0 -2px 6px rgba(255,255,255,.03), 0 6px 16px rgba(0,0,0,.4);}
  .joy-ring{position:absolute;inset:9px;border-radius:50%;border:1.5px dashed rgba(255,255,255,.1);pointer-events:none;}
  .joy-arrows{position:absolute;inset:0;pointer-events:none;color:rgba(255,255,255,.28);font-size:15px;font-weight:800;}
  .joy-arrows span{position:absolute;}
  .joy-arrows .u{top:9px;left:50%;transform:translateX(-50%);}
  .joy-arrows .d{bottom:9px;left:50%;transform:translateX(-50%);}
  .joy-arrows .l{left:11px;top:50%;transform:translateY(-50%);}
  .joy-arrows .r{right:11px;top:50%;transform:translateY(-50%);}
  .joy-knob{position:absolute;left:50%;top:50%;width:66px;height:66px;margin:-33px 0 0 -33px;border-radius:50%;
    background:radial-gradient(circle at 38% 32%,#4a3f38,#211a15 78%);
    box-shadow:0 6px 14px rgba(0,0,0,.5), inset 0 2px 4px rgba(255,255,255,.14);
    display:flex;align-items:center;justify-content:center;font-size:26px;
    transition:transform .07s ease-out;will-change:transform;cursor:grab;}
  .joy-knob.grabbed{transition:none;cursor:grabbing;}

  /* overlays */
  .overlay{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;padding:20px;}
  .overlay.show{display:flex;}
  .veil{position:absolute;inset:0;background:rgba(6,4,3,.72);backdrop-filter:blur(3px);}
  .card{position:relative;width:min(420px,92vw);max-height:90vh;overflow-y:auto;background:var(--panel);
    border:1px solid var(--line);border-radius:20px;padding:26px 22px;text-align:center;box-shadow:0 30px 70px rgba(0,0,0,.6);}
  .card h2{margin:6px 0 4px;font-size:25px;}
  .card p{color:var(--ink-dim);font-size:14px;margin:0 0 6px;}
  .card .big{font-size:52px;line-height:1;margin-bottom:6px;}
  .card .stars-big{font-size:30px;letter-spacing:6px;color:var(--gold);margin:8px 0 4px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4));}
  .btns{display:flex;gap:10px;margin-top:18px;}
  .btn{flex:1;padding:13px 10px;border-radius:13px;border:none;font-weight:800;font-size:15px;cursor:pointer;transition:transform .1s;}
  .btn:active{transform:scale(.96);}
  .btn.primary{background:linear-gradient(180deg,var(--accent),var(--accent-d));color:#04211b;}
  .btn.ghost{background:#2f2721;color:var(--ink);border:1px solid var(--line);}
  /* how-to modal list */
  .howlist{text-align:left;margin:14px 0 4px;font-size:14px;line-height:1.65;color:var(--ink-dim);}
  .howlist .row{display:flex;gap:11px;align-items:flex-start;margin-bottom:11px;}
  .howlist .ic{font-size:19px;line-height:1.4;flex:0 0 auto;}
  .howlist b{color:var(--ink);}

  .toast{position:fixed;left:50%;bottom:calc(206px + env(safe-area-inset-bottom));transform:translateX(-50%);
    background:rgba(20,15,11,.94);border:1px solid var(--line);color:var(--ink);
    padding:9px 16px;border-radius:20px;font-size:13.5px;font-weight:700;z-index:25;max-width:90vw;text-align:center;
    opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;}

  /* ---------------- intro / publisher splash ---------------- */
  #intro{z-index:50;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;
    background:radial-gradient(circle at 50% 38%,#101a22,#05080c 72%);}
  #intro.leaving{animation:introOut .45s ease forwards;}
  @keyframes introOut{0%{opacity:1;}100%{opacity:0;}}
  .intro-badge{width:min(46vw,180px);opacity:0;transform:scale(.62);
    animation:badgeIn .62s cubic-bezier(.2,1.4,.4,1) forwards .08s;
    filter:drop-shadow(0 0 22px rgba(60,200,180,.35));}
  @keyframes badgeIn{0%{opacity:0;transform:scale(.62) rotate(-6deg);}
    62%{opacity:1;transform:scale(1.06) rotate(1deg);}
    100%{opacity:1;transform:scale(1) rotate(0);}}
  .intro-badge svg{width:100%;height:100%;display:block;
    animation:badgeGlow 1.8s ease-in-out infinite 0.7s;}
  @keyframes badgeGlow{0%,100%{filter:drop-shadow(0 0 6px rgba(90,220,190,.35));}
    50%{filter:drop-shadow(0 0 16px rgba(90,220,190,.7));}}
  .intro-word{margin-top:16px;opacity:0;transform:translateY(8px);
    animation:wordIn .5s ease forwards .38s;
    display:flex;align-items:baseline;gap:.32em;font-weight:900;letter-spacing:.04em;
    font-size:clamp(26px,7vw,40px);}
  @keyframes wordIn{to{opacity:1;transform:translateY(0);}}

  function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

  function stageConfig(tier,n){
    const b=BANDS[tier];
    const size=b.sizes[Math.min(2,Math.floor((n-1)/10))];
    const tt=(n-1)/(STAGES_PER_TIER-1);
    const obstacleRatio=b.obs[0]+(b.obs[1]-b.obs[0])*tt;
    const ti=TIERS.indexOf(tier);
    return {size, obstacleRatio, minCov:b.minCov, hints:b.hints, seed:(((ti*97+n)>>>0)*2654435761)>>>0};

  function generateStage(tier,n){
    const {size,obstacleRatio,minCov,hints,seed}=stageConfig(tier,n);
    const N=size*size, idx=(x,y)=>y*size+x, inb=(x,y)=>x>=0&&y>=0&&x<size&&y<size;
    const neighbors=(x,y)=>{const o=[];if(inb(x,y-1))o.push([x,y-1]);if(inb(x+1,y))o.push([x+1,y]);if(inb(x,y+1))o.push([x,y+1]);if(inb(x-1,y))o.push([x-1,y]);return o;};
    // one attempt at a layout for a given rng; returns {best, freeCount}
    function buildOnce(rng){
      const blocked=new Array(N).fill(false);
      let want=Math.round(N*obstacleRatio), guard=0;
      while(want>0&&guard++<500){const p=(rng()*N)|0;if(!blocked[p]){blocked[p]=true;want--;}}
      function walkFrom(sx,sy){
        const visited=new Array(N).fill(false);
        for(let i=0;i<N;i++) if(blocked[i]) visited[i]=true;
        if(visited[idx(sx,sy)]) return null;
        visited[idx(sx,sy)]=true; const path=[[sx,sy]]; let cx=sx,cy=sy;
        while(true){
          const opts=neighbors(cx,cy).filter(([nx,ny])=>!visited[idx(nx,ny)]);
          if(!opts.length) break;
          let pick;
          if(rng()<0.82){
            let bb=Infinity,bl=[];
            for(const [nx,ny] of opts){let deg=0;for(const [ax,ay] of neighbors(nx,ny)) if(!visited[idx(ax,ay)]) deg++;
              if(deg<bb){bb=deg;bl=[[nx,ny]];}else if(deg===bb){bl.push([nx,ny]);}}
            pick=bl[(rng()*bl.length)|0];
          } else pick=opts[(rng()*opts.length)|0];
          visited[idx(pick[0],pick[1])]=true; path.push(pick); cx=pick[0]; cy=pick[1];
        }
        return path;
      }
      let best=[]; const starts=[];
      for(let i=0;i<N;i++) if(!blocked[i]) starts.push(i);
      const attempts=Math.min(70,Math.max(24,starts.length*2));
      for(let a=0;a<attempts;a++){const s=starts[(rng()*starts.length)|0];const w=walkFrom(s%size,(s/size)|0);if(w&&w.length>best.length)best=w;}
      return {best, freeCount:starts.length, blocked};
    }
    // retry different obstacle layouts until the path covers enough of the
    // free space (keeps every stage long enough to require real planning)
    let chosen=null;
    for(let salt=0; salt<60; salt++){
      const rng=mulberry32((seed ^ ((salt*0x9E3779B1)>>>0))>>>0);
      const r=buildOnce(rng);
      if(!chosen || r.best.length>chosen.best.length) chosen=r;
      const target=Math.ceil(r.freeCount*minCov);
      if(r.best.length>=target && r.best.length>=2){ chosen=r; break; }
    }
    const best=chosen.best;
    const grid=new Array(N).fill("crate");
    for(const [x,y] of best) grid[idx(x,y)]="floor";
    return {size,grid,start:{x:best[0][0],y:best[0][1]},goal:{x:best[best.length-1][0],y:best[best.length-1][1]},

  }

  function solvePath(){
    const {data,size}=cur, idx=(x,y)=>y*size+x;
    const isFloor=i=>data.grid[i]!=="crate";
    const total=data.floorCount, goal=data.goal;
    const visited=new Array(size*size).fill(false);
    cur.cleaned.forEach(k=>{const [x,y]=k.split(",").map(Number);visited[idx(x,y)]=true;});
    let nodes=0; const CAP=400000;
    const D=[[0,-1],[0,1],[-1,0],[1,0]];
    function dfs(x,y,count){
      if(nodes++>CAP) return null;
      if(count===total) return (x===goal.x&&y===goal.y)?[]:null;
      const opts=[];
      for(const [dx,dy] of D){
        const nx=x+dx,ny=y+dy;
        if(nx<0||ny<0||nx>=size||ny>=size) continue;
        const ni=idx(nx,ny);
        if(!isFloor(ni)||visited[ni]) continue;
        if(nx===goal.x&&ny===goal.y&&count!==total-1) continue;
        let deg=0;
        for(const [ex,ey] of D){const ax=nx+ex,ay=ny+ey;if(ax<0||ay<0||ax>=size||ay>=size)continue;const ai=idx(ax,ay);if(isFloor(ai)&&!visited[ai])deg++;}
        opts.push([nx,ny,deg]);
      }
      opts.sort((a,b)=>a[2]-b[2]);
      for(const [nx,ny] of opts){
        const ni=idx(nx,ny); visited[ni]=true;
        const r=dfs(nx,ny,count+1);
        visited[ni]=false;
        if(r){ r.unshift([nx,ny]); return r; }
      }
      return null;
    }
    return dfs(cur.pos.x,cur.pos.y,cur.cleaned.size);
  }

    return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">${defs}${wall}${floor}${cobwebs}${bulb}${win}${crates}${rightCrates}${tag}<rect x="0" y="0" width="${W}" height="${H}" fill="url(#whVig)"/></svg>`;
  }

  /* ---------------- room scene backdrop (distinct per board size) ---------------- */
  function sceneSVG(size,idPrefix){
    const P=idPrefix||"sc";              // id prefix so multiple scene instances in one document never clash
    // dim interior palettes (dark room) - sky stays bright daylight for contrast
    const T={
      4:{wa:['#40301f','#241810'],fl:['#513c25','#2f2113'],sky:['#bfe3ff','#eef8ff'],extra:'cozy'},
      5:{wa:['#463522','#291d12'],fl:['#553f26','#331f13'],sky:['#cfeaff','#f2faff'],extra:'living'},
      6:{wa:['#372a1c','#1f160e'],fl:['#463420','#291c10'],sky:['#ffe6c2','#fff3e0'],extra:'attic'},
      7:{wa:['#443421','#271b10'],fl:['#523c22','#301f10'],sky:['#c7ecff','#eefaff'],extra:'sun'},
      8:{wa:['#332518','#1c130c'],fl:['#3f2e1c','#241a0e'],sky:['#bfe0ff','#e8f4ff'],extra:'loft'},
      9:{wa:['#412e1e','#251a10'],fl:['#4c3820','#2b1e10'],sky:['#ffdca8','#fff0d6'],extra:'grand'}
    }[size] || {wa:['#40301f','#241810'],fl:['#513c25','#2f2113'],sky:['#bfe3ff','#eef8ff'],extra:'cozy'};
    const W=100,H=180,hz=94,seam='#00000045';
    let winIdx=0;                       // unique id per window for clip/cloud defs
    const defs=`<defs>
      <linearGradient id="${P}Wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${T.wa[0]}"/><stop offset="1" stop-color="${T.wa[1]}"/></linearGradient>
      <linearGradient id="${P}Fg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${T.fl[0]}"/><stop offset="1" stop-color="${T.fl[1]}"/></linearGradient>
      <linearGradient id="${P}Sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${T.sky[0]}"/><stop offset="1" stop-color="${T.sky[1]}"/></linearGradient>
      <radialGradient id="${P}Vig" cx="50%" cy="40%" r="75%"><stop offset="42%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity=".62"/></radialGradient>
      <linearGradient id="${P}Beam" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fff8dc" stop-opacity=".92"/><stop offset="1" stop-color="#fff8dc" stop-opacity="0"/></linearGradient>
    </defs>`;
    let wall=`<rect x="0" y="0" width="${W}" height="${hz}" fill="url(#${P}Wg)"/>`;
    for(let x=12;x<W;x+=12) wall+=`<rect x="${x-0.35}" y="0" width="0.7" height="${hz}" fill="${seam}"/>`;
    for(let y=0;y<hz;y+=1.7) wall+=`<rect x="0" y="${y}" width="${W}" height="0.35" fill="#ffffff06"/>`;
    wall+=`<rect x="0" y="${hz-4}" width="${W}" height="4" fill="${T.wa[1]}"/><rect x="0" y="${hz-4}" width="${W}" height="0.8" fill="#ffffff15"/>`;
    let floor=`<rect x="0" y="${hz}" width="${W}" height="${H-hz}" fill="url(#${P}Fg)"/>`;
    for(let x=-40;x<=140;x+=14) floor+=`<line x1="50" y1="${hz}" x2="${x}" y2="${H}" stroke="${seam}" stroke-width="0.5"/>`;
    for(let i=1;i<=4;i++){const y=hz+(H-hz)*(i*i/20);floor+=`<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="#00000022" stroke-width="0.5"/>`;}
    floor+=`<rect x="0" y="${hz}" width="${W}" height="3" fill="#000" opacity=".2"/>`;
    // fluffy little cloud made of overlapping puffs, centered at local (0,0)
    const cloudPuff=(sc)=>`<ellipse cx="0" cy="0" rx="${(3.4*sc).toFixed(2)}" ry="${(1.5*sc).toFixed(2)}" fill="#ffffffe8"/>
      <ellipse cx="${(-2.6*sc).toFixed(2)}" cy="${(0.4*sc).toFixed(2)}" rx="${(2.1*sc).toFixed(2)}" ry="${(1.1*sc).toFixed(2)}" fill="#ffffffd2"/>
      <ellipse cx="${(2.4*sc).toFixed(2)}" cy="${(0.5*sc).toFixed(2)}" rx="${(2.3*sc).toFixed(2)}" ry="${(1.2*sc).toFixed(2)}" fill="#ffffffd2"/>`;
    // a drifting cloud group that loops sideways across a window's width
    const driftCloud=(x,y,w,sc,dur,beginOffset)=>
      `<g><animateTransform attributeName="transform" type="translate"
          values="${(x-w*0.35).toFixed(1)} ${y}; ${(x+w*1.3).toFixed(1)} ${y}"
          dur="${dur}s" begin="${beginOffset}s" repeatCount="indefinite"/>${cloudPuff(sc)}</g>`;
    const winSquare=(x,y,w,h,arch)=>{
      const id=P+"wclip"+(winIdx++);
      const skyShape = arch
        ? `M${x} ${y+h} V${y+h*0.4} A${w/2} ${w/2} 0 0 1 ${x+w} ${y+h*0.4} V${y+h} Z`
        : `M${x} ${y} H${x+w} V${y+h} H${x} Z`;
      const dur=(10+w*0.18).toFixed(1);
      let s=`<g><rect x="${x-2.5}" y="${y-2.5}" width="${w+5}" height="${h+5}" rx="1.5" fill="${T.wa[1]}"/>`;
      // warm glow bleeding onto the wall around the window
      s+=`<ellipse cx="${x+w/2}" cy="${y+h/2}" rx="${w*0.9}" ry="${h*0.9}" fill="#ffe9b0" opacity=".16"/>`;
      s+=`<clipPath id="${id}"><path d="${skyShape}"/></clipPath>`;
      s+=`<g clip-path="url(#${id})">`;
      s+=`<path d="${skyShape}" fill="url(#${P}Sky)"/>`;
      s+=driftCloud(x,y+h*0.32,w,1,dur,0);
      s+=driftCloud(x,y+h*0.58,w,0.7,dur,-(dur/2));
      s+=`</g>`;
      s+=`<rect x="${x+w/2-0.6}" y="${y}" width="1.2" height="${h}" fill="${T.wa[1]}"/><rect x="${x}" y="${y+h/2-0.6}" width="${w}" height="1.2" fill="${T.wa[1]}"/>`;
      s+=`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="none" stroke="${T.wa[1]}" stroke-width="1.4"/></g>`;
      s+=`<path d="M${x} ${y+h} L${x+w} ${y+h} L${x+w+10} ${H} L${x-18} ${H} Z" fill="url(#${P}Beam)" opacity=".85"/>`;
      return s;
    };
    const plant=(x,b,s)=>`<g transform="translate(${x},${b}) scale(${s})"><path d="M0 0 L2 8 L-2 8 Z" fill="#7a4a24"/><ellipse cx="0" cy="0" rx="5" ry="2" fill="#5a3418"/><path d="M0 0 Q-6 -10 -2 -14 Q0 -8 0 0" fill="#3f7d3a"/><path d="M0 0 Q6 -11 2 -15 Q0 -8 0 0" fill="#4f9147"/><path d="M0 0 Q0 -14 0 -18 Q3 -12 0 0" fill="#45883f"/></g>`;
    const frame=(x,y,w,h)=>`<g><rect x="${x}" y="${y}" width="${w}" height="${h}" fill="#6b4a28"/><rect x="${x+1.4}" y="${y+1.4}" width="${w-2.8}" height="${h-2.8}" fill="#cbb089"/><path d="M${x+1.4} ${y+h-1.4} L${x+w*0.4} ${y+h*0.45} L${x+w*0.6} ${y+h*0.62} L${x+w-1.4} ${y+h*0.35} V${y+h-1.4} Z" fill="#7ba05a"/><circle cx="${x+w*0.75}" cy="${y+h*0.3}" r="1.6" fill="#ffd86b"/></g>`;
    const box=(x,y,s)=>`<g transform="translate(${x},${y}) scale(${s})"><rect x="-7" y="-12" width="14" height="12" fill="#b07a3c" stroke="#7d5325" stroke-width="1"/><path d="M-7 -12 L7 -12 M0 -12 V0" stroke="#7d5325" stroke-width="0.8"/></g>`;
    const sofa=(x,y)=>`<g><rect x="${x}" y="${y}" width="34" height="12" rx="3" fill="#6f7f9a"/><rect x="${x-2}" y="${y-6}" width="8" height="14" rx="3" fill="#7f8fac"/><rect x="${x+28}" y="${y-6}" width="8" height="14" rx="3" fill="#7f8fac"/><rect x="${x+3}" y="${y-4}" width="12" height="8" rx="2" fill="#8b9bb8"/><rect x="${x+18}" y="${y-4}" width="12" height="8" rx="2" fill="#8b9bb8"/></g>`;
    const lamp=(x,b)=>`<g><rect x="${x-0.7}" y="${b-30}" width="1.4" height="30" fill="#4a3a28"/><ellipse cx="${x}" cy="${b}" rx="4" ry="1.4" fill="#3a2c1c"/><path d="M${x-6} ${b-30} L${x+6} ${b-30} L${x+4} ${b-22} L${x-4} ${b-22} Z" fill="#f4d68a"/><ellipse cx="${x}" cy="${b-14}" rx="9" ry="6" fill="#fff2c0" opacity=".25"/></g>`;
    const ladder=(x,b)=>{let s=`<g><rect x="${x}" y="${b-46}" width="1.6" height="46" fill="#7a5330"/><rect x="${x+10}" y="${b-46}" width="1.6" height="46" fill="#7a5330"/>`;for(let i=1;i<=6;i++)s+=`<rect x="${x}" y="${b-46+i*6.5}" width="11.6" height="1.4" fill="#8a6236"/>`;return s+`</g>`;};
    const rafters=()=>`<g stroke="#5a3d22" stroke-width="2.4" opacity=".9"><line x1="0" y1="0" x2="50" y2="46"/><line x1="100" y1="0" x2="50" y2="46"/><line x1="0" y1="20" x2="34" y2="0"/><line x1="100" y1="20" x2="66" y2="0"/></g><line x1="0" y1="46" x2="100" y2="46" stroke="#4a3018" stroke-width="2.6"/>`;
    const chandelier=()=>`<g><line x1="50" y1="0" x2="50" y2="14" stroke="#3a2c1a" stroke-width="1.2"/><ellipse cx="50" cy="16" rx="12" ry="3" fill="#5a4326"/><circle cx="40" cy="18" r="2.2" fill="#ffe28a"/><circle cx="50" cy="19" r="2.2" fill="#ffe28a"/><circle cx="60" cy="18" r="2.2" fill="#ffe28a"/></g>`;
    let scene='';
    if(T.extra==='cozy') scene=winSquare(60,20,30,34,false)+plant(16,hz-2,1.0)+frame(14,20,16,13);
    else if(T.extra==='living') scene=winSquare(20,20,26,30,false)+winSquare(58,20,26,30,false)+sofa(33,hz-14)+lamp(88,hz-2)+`<ellipse cx="50" cy="${hz+22}" rx="42" ry="9" fill="#00000022"/>`;
    else if(T.extra==='attic') scene=rafters()+winSquare(58,26,30,30,true)+box(20,hz-1,1.1)+box(30,hz-1,0.9)+box(24,hz-13,0.8);
    else if(T.extra==='sun') scene=winSquare(16,16,28,42,true)+winSquare(56,16,28,42,true)+plant(12,hz-2,1.2)+plant(90,hz-2,1.1);
    else if(T.extra==='loft') scene=`<line x1="0" y1="30" x2="100" y2="30" stroke="#5a3d22" stroke-width="2.4"/>`+winSquare(20,36,24,42,false)+winSquare(58,36,24,42,false)+ladder(82,hz-1)+box(14,hz-1,1.0);
    else{
      const rid=P+"wclip"+(winIdx++), dur=(15).toFixed(1);
      scene=`<ellipse cx="50" cy="30" rx="20" ry="20" fill="#ffe9b0" opacity=".16"/>`
        +`<circle cx="50" cy="30" r="17" fill="${T.wa[1]}"/>`
        +`<clipPath id="${rid}"><circle cx="50" cy="30" r="14"/></clipPath>`
        +`<g clip-path="url(#${rid})"><rect x="30" y="10" width="40" height="40" fill="url(#${P}Sky)"/>`
        +driftCloud(36,26,28,1,dur,0)+driftCloud(36,34,28,0.7,dur,-(dur/2))
        +`</g>`
        +`<g stroke="${T.wa[1]}" stroke-width="1.2"><line x1="36" y1="30" x2="64" y2="30"/><line x1="50" y1="16" x2="50" y2="44"/><line x1="40" y1="20" x2="60" y2="40"/><line x1="60" y1="20" x2="40" y2="40"/></g>`
        +`<circle cx="50" cy="30" r="14" fill="none" stroke="${T.wa[1]}" stroke-width="1.4"/>`
        +`<path d="M36 44 L64 44 L74 ${H} L26 ${H} Z" fill="url(#${P}Beam)" opacity=".85"/>`
        +chandelier()+plant(14,hz-2,1.2)+plant(88,hz-2,1.2);
    }
    return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">${defs}${wall}${floor}${scene}<rect x="0" y="0" width="${W}" height="${H}" fill="url(#${P}Vig)"/></svg>`;
  }

  /* ---------------- progress ---------------- */
  function freshProgress(){
    const p={lang:"ko"};
    TIERS.forEach(tr=>p[tr]={unlocked:1,stars:{}});
    return p;
  }
  function loadProgress(){
    try{const raw=localStorage.getItem(PROG_KEY);if(raw){const p=JSON.parse(raw);TIERS.forEach(tr=>{if(!p[tr])p[tr]={unlocked:1,stars:{}};});return p;}}catch(e){}
    return freshProgress();
  }
  function saveProgress(){try{localStorage.setItem(PROG_KEY,JSON.stringify(progress));}catch(e){}}
  let progress=loadProgress();
  lang = progress.lang && I18N[progress.lang] ? progress.lang : "ko";

  /* ---------------- sound ---------------- */
  let actx=null;
  function beep(freq,dur,type,vol){try{if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.type=type||"triangle";o.frequency.value=freq;g.gain.value=vol||0.05;o.connect(g);g.connect(actx.destination);const tt=actx.currentTime;o.start(tt);g.gain.exponentialRampToValueAtTime(0.0001,tt+(dur||0.09));o.stop(tt+(dur||0.09));}catch(e){}}
  const sfxClean=()=>beep(660+Math.random()*60,0.1,"sine",0.055);
  // filtered-noise sweep sound; stroke 1 = low soft "쓰윽", stroke 2 = higher crisp "싹"
  function sfxScrub(stroke){try{if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)();
    const dur=stroke===2?0.1:0.16, buf=actx.createBuffer(1,(actx.sampleRate*dur)|0,actx.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
    const src=actx.createBufferSource(); src.buffer=buf;
    const bp=actx.createBiquadFilter(); bp.type="bandpass";
    bp.frequency.value = stroke===2 ? 3400 : 1900; bp.Q.value=0.8;
    const g=actx.createGain(); g.gain.value = stroke===2 ? 0.065 : 0.05;
    src.connect(bp); bp.connect(g); g.connect(actx.destination); src.start();
  }catch(e){}}
  const sfxBump =()=>beep(120,0.1,"square",0.05);
  const sfxHint =()=>beep(880,0.12,"sine",0.05);
  const sfxWin  =()=>[523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.16,"triangle",0.06),i*110));

  /* ---------------- DOM ---------------- */
  const $=s=>document.querySelector(s);
  const gameLogoScreen=$("#gameLogo"), mainMenuScreen=$("#mainMenu"), selectScreen=$("#select"), gameScreen=$("#game");
  const SCREEN_ELS={gameLogo:gameLogoScreen, mainMenu:mainMenuScreen, select:selectScreen, game:gameScreen};
  const stageGrid=$("#stageGrid"), board=$("#board");
  const hudStage=$("#hudStage"), hudProg=$("#hudProg"), undoBtn=$("#undoBtn"), hintBtn=$("#hintBtn"), toastEl=$("#toast");

  let curTier="beginner";
  let cur=null, animating=false;
  const key=(x,y)=>x+","+y;

  function showScreen(w){
    for(const name in SCREEN_ELS) SCREEN_ELS[name].classList.toggle("show",name===w);
  }

  /* ---------------- language UI ---------------- */
  function buildLangBar(){
    const bar=$("#langbar"); bar.innerHTML="";
    [["ko"],["en"],["vi"]].forEach(([lc])=>{
      const b=document.createElement("button");
      b.className="flagbtn"+(lang===lc?" active":"");
      b.innerHTML=FLAGS[lc];
      b.title=lc.toUpperCase();
      b.addEventListener("click",()=>setLang(lc));
      bar.appendChild(b);
    });
  }
  function setLang(lc){
    lang=lc; progress.lang=lc; saveProgress();
    document.documentElement.lang = lc;
    buildLangBar(); renderStatic(); buildTierTabs(); buildStageGrid();
    if(gameScreen.classList.contains("show")) updateHud();
  }
  function renderStatic(){
    $("#uiKicker").textContent=t("kicker");
    $("#uiTitle").textContent=t("title");
    $("#uiSubtitle").textContent=t("subtitle");
    $("#uiHowto").textContent=t("howto");
    $("#uiStart").textContent=t("startBtn");
    $("#resetProg").textContent=t("reset");
    $("#glTag").textContent=t("heroTag");
    $("#glTitle").textContent=t("title");
    $("#glPrompt").textContent=t("pressStart");
    $("#selTitle").textContent=t("stageSelectTitle");
    $("#selBackBtn").title=t("toMenuTitle");
  }

  /* ---------------- tier tabs ---------------- */
  function buildTierTabs(){
    const wrap=$("#tierTabs"); wrap.innerHTML="";
    TIERS.forEach(tr=>{
      const b=document.createElement("button");
      b.className="tier-tab"+(curTier===tr?" active":"");
      const label = tr==="beginner"?t("tierBeginner"):tr==="intermediate"?t("tierIntermediate"):t("tierAdvanced");
      b.innerHTML=`<span>${label}</span><span class="tsub">${t("tierSub")}</span>`;
      b.addEventListener("click",()=>{curTier=tr;buildTierTabs();buildStageGrid();});
      wrap.appendChild(b);
    });
  }

  /* ---------------- stage grid ---------------- */
  function buildStageGrid(){
    stageGrid.innerHTML="";
    const tp=progress[curTier];
    for(let n=1;n<=STAGES_PER_TIER;n++){
      const locked=n>tp.unlocked;
      const stars=tp.stars[n]||0;
      const btn=document.createElement("button");
      btn.className="stage-btn"+(locked?" locked":"")+(stars?" cleared":"");
      btn.innerHTML=locked
        ? `<span class="lockic">🔒</span><span class="lab">${t("stageWord")} ${String(n).padStart(2,"0")}</span>`
        : `${stars?`<span class="stars">${"★".repeat(stars)}</span>`:""}<span class="num">${String(n).padStart(2,"0")}</span><span class="lab">${t("stageWord")}</span>`;
      if(!locked) btn.addEventListener("click",()=>startStage(curTier,n));
      stageGrid.appendChild(btn);
    }
  }

  /* ---------------- toast ---------------- */
  let toastTimer=null;
  function toast(msg){toastEl.textContent=msg;toastEl.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>toastEl.classList.remove("show"),1400);}

  /* ---------------- start stage ---------------- */
  function startStage(tier,n){
    const data=generateStage(tier,n);
    cur={tier,stage:n,data,size:data.size,cleaned:new Set(),path:[],pos:{...data.start},cellEls:{},playerEl:null,hintsLeft:data.hints,undosUsed:0};
    renderBoard();
    markClean(data.start.x,data.start.y,false);
    updateHud();
    showScreen("game"); hideOverlays();
  }

  function renderBoard(){
    const {data,size}=cur;
    const sc=document.getElementById("scene"); if(sc) sc.innerHTML=sceneSVG(size);
    board.style.gridTemplateColumns=`repeat(${size},1fr)`;
    board.innerHTML=""; cur.cellEls={};
    for(let y=0;y<size;y++)for(let x=0;x<size;x++){
      const ty=data.grid[y*size+x];
      const cell=document.createElement("div");
      cell.className="cell "+(ty==="crate"?"crate":"floor");
      const isStart=data.start.x===x&&data.start.y===y;
      const isGoal=data.goal.x===x&&data.goal.y===y;
      if(ty!=="crate"&&isStart){cell.classList.add("start");cell.innerHTML=`<div class="mark"><span class="tag" data-tag="start"></span></div>`;}
      if(ty!=="crate"&&isGoal){cell.classList.add("goal");cell.innerHTML=`<div class="mark"><span class="door">${DOOR_SVG}</span><span class="tag" data-tag="goal"></span></div>`;}
      board.appendChild(cell);
      cur.cellEls[key(x,y)]=cell;
    }
    // localized tags (출발/도착)
    const tags={start:{ko:"출발",en:"START",vi:"BẮT ĐẦU"},goal:{ko:"도착",en:"EXIT",vi:"CỬA RA"}};
    board.querySelectorAll("[data-tag]").forEach(el=>{el.textContent=tags[el.dataset.tag][lang]||tags[el.dataset.tag].en;});
    const p=document.createElement("div"); p.className="player"; p.innerHTML=JANITOR_SVG;
    const cp=100/size; p.style.width=(cp*0.92)+"%"; p.style.height=(cp*1.15)+"%";
    board.appendChild(p); cur.playerEl=p; positionPlayer(false);
  }

  function positionPlayer(hop){
    const {pos,size,playerEl}=cur, cp=100/size;
    playerEl.style.left=(cp*(pos.x+0.5))+"%";
    playerEl.style.top =(cp*(pos.y+0.55))+"%";
    if(hop){playerEl.classList.remove("hop","hopf","mopping");void playerEl.offsetWidth;playerEl.classList.add("hop","mopping");}
  }

  function markClean(x,y,animate,dir){
    const k=key(x,y); if(cur.cleaned.has(k))return;
    cur.cleaned.add(k); cur.path.push(k);
    const cell=cur.cellEls[k];
    if(!animate){ cell.classList.add("clean"); cell.classList.remove("floor"); refreshGoalGlow(); return; }
    refreshGoalGlow();
    playSweep(cell,dir);
  }
  // two-stroke "쓱-싹" sweep: each stroke has its own timed sound + dust fling,
  // the tile only flips to "clean" on the second stroke's payoff
  function playSweep(cell,dir){
    setTimeout(()=>{
      sfxScrub(1);
      spawnDustBurst(cell,dir,1,4,false);
    },95);
    setTimeout(()=>{
      sfxScrub(2); sfxClean();
      spawnDustBurst(cell,dir,-1,5,true);
      cell.classList.add("clean"); cell.classList.remove("floor");
    },335);
  }
  // dust flung sideways from a mop stroke; final=true adds the settling cloud + sparkles
  function spawnDustBurst(cell,dir,lateralSign,count,final){
    const D={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]}[dir] || [0,-1];
    const fx=D[0], fy=D[1], px=-fy*lateralSign, py=fx*lateralSign; // forward + this stroke's lateral kick
    const frag=document.createDocumentFragment();
    if(final){
      const cloud=document.createElement("span"); cloud.className="fx fx-cloud";
      cloud.style.setProperty("--cx",(fx*11).toFixed(1)+"px");
      cloud.style.setProperty("--cy",(fy*8-2).toFixed(1)+"px");
      frag.appendChild(cloud); setTimeout(()=>cloud.remove(),520);
    }
    for(let i=0;i<count;i++){
      const d=document.createElement("span"); d.className="fx fx-dust";
      const sz=(3+Math.random()*4); d.style.width=sz.toFixed(1)+"px"; d.style.height=sz.toFixed(1)+"px";
      const lat=2+Math.random()*4;
      const mF=3+Math.random()*5, sF=8+Math.random()*11, rise=6+Math.random()*6, fall=5+Math.random()*7;
      d.style.setProperty("--mx",(fx*mF+px*lat).toFixed(1)+"px");
      d.style.setProperty("--my",(fy*mF+py*lat-rise).toFixed(1)+"px");
      d.style.setProperty("--dx",(fx*sF+px*lat*1.3).toFixed(1)+"px");
      d.style.setProperty("--dy",(fy*sF+py*lat*1.3+fall).toFixed(1)+"px");
      d.style.background = Math.random()<0.5 ? "#5a4327" : "#3f2f1c";
      frag.appendChild(d); setTimeout(()=>d.remove(),600);
    }
    if(final) for(let i=0;i<2;i++){
      const s=document.createElement("span"); s.className="fx fx-spark"; s.textContent="✨";
      s.style.setProperty("--sx",(((Math.random()*2-1)*10)).toFixed(1)+"px");
      s.style.setProperty("--sy",(-5-Math.random()*8).toFixed(1)+"px");
      frag.appendChild(s); setTimeout(()=>s.remove(),600);
    }
    cell.appendChild(frag);
  }
  function refreshGoalGlow(){
    const {data}=cur, gc=cur.cellEls[key(data.goal.x,data.goal.y)]; if(!gc)return;
    const remaining=data.floorCount-cur.cleaned.size;
    const goalCleaned=cur.cleaned.has(key(data.goal.x,data.goal.y));
    gc.classList.toggle("ready", !goalCleaned && remaining===1);
  }
  function clearHint(){board.querySelectorAll(".cell.hint").forEach(c=>c.classList.remove("hint"));}

  function updateHud(){
    const {data,tier,stage}=cur;
    const tierName = tier==="beginner"?t("tierBeginner"):tier==="intermediate"?t("tierIntermediate"):t("tierAdvanced");
    hudStage.textContent=`${tierName} · ${t("stageWord")} ${String(stage).padStart(2,"0")}`;
    hudProg.innerHTML=`<span class="done">${cur.cleaned.size}</span> / ${data.floorCount} ${t("tiles")}`;
    undoBtn.disabled=cur.path.length<=1;
    $("#hintCount").textContent=cur.hintsLeft;
    hintBtn.disabled=cur.hintsLeft<=0;
    hintBtn.title=t("hintTitle");
    undoBtn.title=t("undoTitle"); $("#restartBtn").title=t("restartTitle"); $("#backBtn").title=t("backTitle");
  }

  /* ---------------- movement ---------------- */
  const DIRS={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
  function tryMove(dir){
    if(!cur||animating)return;
    if($("#winOverlay").classList.contains("show"))return;
    const [dx,dy]=DIRS[dir], nx=cur.pos.x+dx, ny=cur.pos.y+dy, {data,size}=cur;
    if(dir==="left")cur.playerEl.classList.add("flip");
    else if(dir==="right")cur.playerEl.classList.remove("flip");
    if(nx<0||ny<0||nx>=size||ny>=size){sfxBump();return;}
    const ty=data.grid[ny*size+nx], nk=key(nx,ny);
    if(ty==="crate"){bumpCell(nx,ny);sfxBump();toast(t("tCrate"));return;}
    if(cur.cleaned.has(nk)){bumpCell(nx,ny);sfxBump();toast(t("tCleaned"));return;}
    const isGoal=data.goal.x===nx&&data.goal.y===ny;
    if(isGoal&&(data.floorCount-cur.cleaned.size)>1){bumpCell(nx,ny);sfxBump();toast(t("tGoal"));return;}
    clearHint();
    cur.pos={x:nx,y:ny}; positionPlayer(true); updateHud();
    if(isGoal){
      markClean(nx,ny,false,dir);          // door tile: no sweep FX, straight to the cutscene
      cur.playerEl.classList.remove("mopping"); // no mop-swing on the walk-through step
      animating=true;
      playDoorCutscene(cur.cellEls[nk],dir);
      return;
    }
    markClean(nx,ny,true,dir); updateHud();
    if(!hasAnyMove()) setTimeout(()=>{if(!isWon())showStuck();},260);
  }
  // door swings open, player walks through the light, then the win popup appears
  function playDoorCutscene(cell,dir){
    sfxWin();
    cell.classList.add("opening");
    setTimeout(()=>{
      cur.playerEl.classList.add("walkin");
    },120);
    setTimeout(()=>{ onWin(); },650);
  }
  function hasAnyMove(){
    const {data,size}=cur;
    for(const d in DIRS){const [dx,dy]=DIRS[d];const nx=cur.pos.x+dx,ny=cur.pos.y+dy;
      if(nx<0||ny<0||nx>=size||ny>=size)continue;
      if(data.grid[ny*size+nx]==="crate")continue;
      if(cur.cleaned.has(key(nx,ny)))continue;
      const isGoal=data.goal.x===nx&&data.goal.y===ny;
      if(isGoal&&(data.floorCount-cur.cleaned.size)>1)continue;
      return true;}
    return false;
  }
  const isWon=()=>cur&&cur.cleaned.size===cur.data.floorCount;
  function bumpCell(x,y){const c=cur.cellEls[key(x,y)];if(!c)return;c.classList.remove("bump");void c.offsetWidth;c.classList.add("bump");}

  /* ---------------- hint ---------------- */
  function useHint(){
    if(!cur||animating||cur.hintsLeft<=0)return;
    const path=solvePath();
    if(!path||!path.length){toast(t("tHintNone"));return;}
    cur.hintsLeft--; updateHud();
    clearHint();
    const [hx,hy]=path[0];
    const c=cur.cellEls[key(hx,hy)]; if(c)c.classList.add("hint");
    sfxHint(); toast(t("tHint"));
  }

  /* ---------------- undo ---------------- */
  function undo(){
    if(!cur||animating||cur.path.length<=1)return;
    cur.undosUsed++;
    const lastK=cur.path.pop(); cur.cleaned.delete(lastK);
    const cell=cur.cellEls[lastK]; cell.classList.remove("clean"); cell.classList.add("floor");
    const [px,py]=cur.path[cur.path.length-1].split(",").map(Number);
    cur.pos={x:px,y:py}; clearHint(); positionPlayer(true); refreshGoalGlow(); updateHud(); hideOverlays();
  }

  /* ---------------- win / stuck ---------------- */
  function onWin(){
    // hint sound already played when the door opened; compute a real score now
    const hintsUsed=cur.data.hints-cur.hintsLeft, undosUsed=cur.undosUsed, assists=hintsUsed+undosUsed;
    const stars = assists===0 ? 3 : assists<=2 ? 2 : 1;
    const tp=progress[cur.tier];
    tp.stars[cur.stage]=Math.max(tp.stars[cur.stage]||0,stars);
    if(cur.stage>=tp.unlocked&&cur.stage<STAGES_PER_TIER) tp.unlocked=cur.stage+1;
    saveProgress(); buildStageGrid();
    const isLast=cur.stage>=STAGES_PER_TIER;
    const bigEl=$("#winOverlay .big");
    // special message: Vietnamese language + Beginner stage 30 cleared
    const special = lang==="vi" && cur.tier==="beginner" && cur.stage===STAGES_PER_TIER;
    if(special){
      bigEl.textContent="💛";
      $("#winTitle").innerHTML='Tuni ơi, anh yêu em thật lòng <span style="color:#ffd400">♥</span>';
      $("#winStars").textContent="";
      $("#winMsg").textContent="";
      $("#winStats").textContent="";
    }else{
      bigEl.textContent="✨🧹✨";
      $("#winTitle").textContent=t("winTitle");
      $("#winStars").textContent="★".repeat(stars)+"☆".repeat(3-stars);
      $("#winMsg").textContent=isLast?t("winLast"):t("winMsg");
      $("#winStats").textContent=statLine(hintsUsed,undosUsed);
    }
    $("#winRetry").textContent=t("retry");
    $("#winNext").textContent=isLast?t("toStart"):t("next");
    setTimeout(()=>{$("#winOverlay").classList.add("show");animating=false;},160);
  }
  function showStuck(){
    $("#stuckTitle").textContent=t("stuckTitle");
    $("#stuckBody").textContent=t("stuckBody");
    $("#stuckSelect").textContent=t("selectBtn");
    $("#stuckRetry").textContent=t("restartBtn");
    $("#stuckOverlay").classList.add("show");
  }
  function hideOverlays(){$("#winOverlay").classList.remove("show");$("#stuckOverlay").classList.remove("show");}

  /* ---------------- how-to modal ---------------- */
  function openHowto(){
    $("#howtoTitle").textContent=t("howtoTitle");
    const list=$("#howtoList"); list.innerHTML="";
    t("how").forEach(([ic,html])=>{
      const row=document.createElement("div"); row.className="row";
      row.innerHTML=`<span class="ic">${ic}</span><div>${html}</div>`;
      list.appendChild(row);
    });
    $("#howtoClose").textContent=t("close");
    $("#howtoOverlay").classList.add("show");
  }

  /* ---------------- input ---------------- */
  document.addEventListener("keydown",(e)=>{
    const k=e.key;
    const confirm = k==="Enter"||k===" "||k==="Spacebar";
    const escape  = k==="Escape"||k==="Esc";
    // title card: any key advances to the main menu
    if(gameLogoScreen.classList.contains("show")){ e.preventDefault(); showScreen("mainMenu"); return; }
    // popups take priority (work on any screen)
    if($("#howtoOverlay").classList.contains("show")){
      if(confirm||escape){e.preventDefault();$("#howtoOverlay").classList.remove("show");}
      return;
    }
    if($("#winOverlay").classList.contains("show")){
      if(confirm){e.preventDefault();$("#winNext").click();}
      else if(escape){e.preventDefault();hideOverlays();showScreen("select");}
      return;
    }
    if($("#stuckOverlay").classList.contains("show")){
      if(confirm){e.preventDefault();$("#stuckRetry").click();}
      else if(escape){e.preventDefault();hideOverlays();showScreen("select");}
      return;
    }
    // in-game controls
    if(gameScreen.classList.contains("show")){
      if(escape){e.preventDefault();showScreen("select");return;}
      const m={ArrowUp:"up",ArrowDown:"down",ArrowLeft:"left",ArrowRight:"right",w:"up",s:"down",a:"left",d:"right",W:"up",S:"down",A:"left",D:"right"};
      if(m[k]){e.preventDefault();tryMove(m[k]);}
      else if(k==="z"||k==="Z"||k==="Backspace"){e.preventDefault();undo();}
      else if(k==="h"||k==="H")useHint();
      return;
    }
  });
  // ---- single-knob joystick: hold + tilt to walk continuously in that direction ----
  (function setupJoystick(){
    const base=$("#joyBase"), knob=$("#joyKnob");
    if(!base||!knob)return;
    const MAXR=42, DEADZONE=14, STEP_MS=330; // ~130ms glide + ~200ms hold, so continuous walking feels stepped, not a smooth slide
    let activeId=null, originX=0, originY=0, curDir=null, repeatTimer=null;

    function angleToDir(dx,dy){
      if(Math.hypot(dx,dy)<DEADZONE)return null;
      return Math.abs(dx)>Math.abs(dy) ? (dx>0?"right":"left") : (dy>0?"down":"up");
    }
    function setKnob(dx,dy){
      const d=Math.hypot(dx,dy), clamped=Math.min(d,MAXR)||0.0001, a=Math.atan2(dy,dx);
      knob.style.transform=`translate(${(Math.cos(a)*clamped).toFixed(1)}px, ${(Math.sin(a)*clamped).toFixed(1)}px)`;
    }
    function resetKnob(){ knob.style.transform="translate(0,0)"; }
    function step(dir){
      const before=cur?JSON.stringify(cur.pos):null;
      tryMove(dir);
      const after=cur?JSON.stringify(cur.pos):null;
      if(before===after && repeatTimer){ clearInterval(repeatTimer); repeatTimer=null; } // stop hammering a wall
    }
    function setDir(dir){
      if(curDir===dir)return;
      curDir=dir;
      if(repeatTimer){ clearInterval(repeatTimer); repeatTimer=null; }
      if(dir){ step(dir); repeatTimer=setInterval(()=>step(dir),STEP_MS); }
    }
    function stopAll(){
      if(repeatTimer){ clearInterval(repeatTimer); repeatTimer=null; }
      curDir=null; activeId=null; knob.classList.remove("grabbed"); resetKnob();
    }
    base.addEventListener("pointerdown",(e)=>{
      e.preventDefault();
      activeId=e.pointerId; base.setPointerCapture(activeId);
      knob.classList.add("grabbed");
      const r=base.getBoundingClientRect(); originX=r.left+r.width/2; originY=r.top+r.height/2;
      const dx=e.clientX-originX, dy=e.clientY-originY;
      setKnob(dx,dy); setDir(angleToDir(dx,dy));
    });
    base.addEventListener("pointermove",(e)=>{
      if(e.pointerId!==activeId)return;
      const dx=e.clientX-originX, dy=e.clientY-originY;
      setKnob(dx,dy); setDir(angleToDir(dx,dy));
    });
    const release=(e)=>{ if(e.pointerId!==activeId)return; stopAll(); };
    base.addEventListener("pointerup",release);
    base.addEventListener("pointercancel",release);
  })();
  // swipe anywhere on the game screen (empty space too) to move.
  // touches that start on the joystick are left to it.
  let touchStart=null;
  gameScreen.addEventListener("touchstart",(e)=>{
    if(e.target.closest(".joystick")){ touchStart=null; return; }
    const tt=e.changedTouches[0]; touchStart={x:tt.clientX,y:tt.clientY};
  },{passive:true});
  gameScreen.addEventListener("touchend",(e)=>{
    if(!touchStart)return; const tt=e.changedTouches[0];
    const dx=tt.clientX-touchStart.x, dy=tt.clientY-touchStart.y, ax=Math.abs(dx), ay=Math.abs(dy);
    touchStart=null;
    if(Math.max(ax,ay)<20)return;               // ignore taps
    if(ax>ay)tryMove(dx>0?"right":"left"); else tryMove(dy>0?"down":"up");
  },{passive:true});

  /* ---------------- buttons ---------------- */
  $("#backBtn").addEventListener("click",()=>{hideOverlays();showScreen("select");});
  $("#restartBtn").addEventListener("click",()=>{if(cur)startStage(cur.tier,cur.stage);});
  undoBtn.addEventListener("click",undo);
  hintBtn.addEventListener("click",useHint);
  $("#howtoBtn").addEventListener("click",openHowto);
  $("#howtoClose").addEventListener("click",()=>$("#howtoOverlay").classList.remove("show"));
  $("#howtoOverlay").addEventListener("click",(e)=>{if(e.target.classList.contains("veil"))$("#howtoOverlay").classList.remove("show");});
  $("#winNext").addEventListener("click",()=>{if(cur.stage>=STAGES_PER_TIER){hideOverlays();showScreen("mainMenu");}else startStage(cur.tier,cur.stage+1);});
  $("#winRetry").addEventListener("click",()=>startStage(cur.tier,cur.stage));
  $("#stuckRetry").addEventListener("click",()=>startStage(cur.tier,cur.stage));
  $("#stuckSelect").addEventListener("click",()=>{hideOverlays();showScreen("select");});
  $("#resetProg").addEventListener("click",()=>{if(confirm(t("confirmReset"))){progress=freshProgress();progress.lang=lang;saveProgress();buildStageGrid();}});
  $("#startBtn").addEventListener("click",()=>showScreen("select"));
  $("#selBackBtn").addEventListener("click",()=>showScreen("mainMenu"));
  $("#gameLogo").addEventListener("click",()=>showScreen("mainMenu"));

  /* ---------------- intro splash ---------------- */
  let introTimer=null, introDone=false;
  function finishIntro(){
    if(introDone)return;                 // guard: click-skip and the auto-timer can both fire otherwise
    introDone=true;
    if(introTimer)clearTimeout(introTimer);
    const introEl=$("#intro");
    if(!introEl)return;
    introEl.classList.add("leaving");
    setTimeout(()=>{ introEl.classList.remove("show","leaving"); showScreen("gameLogo"); },450);
  }
  function playIntro(){
    const introEl=$("#intro");
    introEl.addEventListener("click",finishIntro,{once:true});
    introTimer=setTimeout(finishIntro,3000);
  }

  /* ---------------- boot ---------------- */
  document.documentElement.lang=lang;
  buildLangBar(); renderStatic(); buildTierTabs(); buildStageGrid();
  $("#glMascot").innerHTML=JANITOR_SVG;
  $("#glScene").innerHTML=glSceneSVG();
  $("#mmScene").innerHTML=menuWarehouseSVG();
  playIntro();
})();
</script>
