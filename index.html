<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>미화부장 김용준 · Chief Janitor Kim</title>
<style>
  :root{
    --bg0:#161311; --bg1:#211c18; --wall:#2b2320; --line:#3a2f28;
    --dirt:#6b5540; --dirt2:#5a4634;
    --crate:#a9773e; --crate-d:#7d5325; --crate-l:#c99552;
    --gold:#ffcf4d; --accent:#33c6a6; --accent-d:#1c8f78;
    --start:#f2a93b; --goal:#39c66a; --hint:#ffe14d;
    --ink:#f4ece2; --ink-dim:#b3a496; --panel:#241e1a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg0);
    font-family:"Segoe UI",system-ui,-apple-system,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    color:var(--ink);user-select:none;-webkit-user-select:none;touch-action:manipulation;}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;}

  .bgtex{position:fixed;inset:0;z-index:-1;
    background:
      radial-gradient(1200px 600px at 50% -10%, #2c2420, transparent 70%),
      repeating-linear-gradient(0deg, transparent 0 38px, rgba(0,0,0,.18) 38px 40px),
      repeating-linear-gradient(90deg, transparent 0 38px, rgba(0,0,0,.18) 38px 40px),
      linear-gradient(180deg,var(--bg1),var(--bg0));}

  .screen{position:absolute;inset:0;display:none;flex-direction:column;}
  .screen.show{display:flex;}

  /* ---------- language bar ---------- */
  .langbar{position:absolute;top:calc(10px + env(safe-area-inset-top));right:14px;display:flex;gap:7px;z-index:6;}
  .flagbtn{width:38px;height:27px;border-radius:6px;border:2px solid transparent;overflow:hidden;
    cursor:pointer;padding:0;background:none;opacity:.5;transition:opacity .15s, transform .1s, border-color .15s;
    box-shadow:0 2px 6px rgba(0,0,0,.4);line-height:0;}
  .flagbtn svg{width:100%;height:100%;display:block;}
  .flagbtn.active{opacity:1;border-color:var(--accent);}
  .flagbtn:active{transform:scale(.9);}

  /* ---------- stage select ---------- */
  #select{overflow-y:auto;padding:20px 16px 40px;-webkit-overflow-scrolling:touch;}
  .title-wrap{text-align:center;padding:30px 0 4px;}
  .kicker{font-size:12px;letter-spacing:.3em;color:var(--accent);font-weight:800;text-transform:uppercase;}
  .title{font-size:clamp(26px,7vw,44px);font-weight:900;letter-spacing:-.01em;margin:4px 0 2px;
    text-shadow:0 2px 0 #000, 0 0 26px rgba(51,198,166,.25);}
  .title .mop{filter:drop-shadow(0 3px 3px rgba(0,0,0,.5));}
  .subtitle{color:var(--ink-dim);font-size:14px;margin-top:2px;padding:0 10px;}
  .howto-btn{display:inline-flex;align-items:center;gap:7px;margin:16px auto 4px;
    background:var(--panel);border:1px solid var(--line);color:var(--ink);
    padding:10px 20px;border-radius:24px;font-size:14px;font-weight:800;cursor:pointer;
    box-shadow:0 4px 12px rgba(0,0,0,.3);transition:transform .1s,border-color .2s;}
  .howto-btn:hover{border-color:var(--accent);}
  .howto-btn:active{transform:scale(.96);}

  /* tier tabs */
  .tiers{max-width:520px;margin:20px auto 0;display:flex;gap:8px;
    background:#1c1713;border:1px solid var(--line);border-radius:16px;padding:6px;}
  .tier-tab{flex:1;padding:11px 4px;border:none;border-radius:11px;background:none;color:var(--ink-dim);
    font-size:15px;font-weight:800;cursor:pointer;transition:background .18s,color .18s;display:flex;
    flex-direction:column;align-items:center;gap:2px;line-height:1.2;}
  .tier-tab .tsub{font-size:9.5px;letter-spacing:.12em;opacity:.75;font-weight:700;}
  .tier-tab.active{background:linear-gradient(180deg,var(--accent),var(--accent-d));color:#04211b;}

  .stages{max-width:560px;margin:16px auto 0;display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
  @media(max-width:400px){.stages{grid-template-columns:repeat(4,1fr);}}
  .stage-btn{position:relative;aspect-ratio:1;border:1px solid var(--line);border-radius:14px;
    background:linear-gradient(180deg,#2c2420,#211b17);color:var(--ink);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    font-weight:800;cursor:pointer;transition:transform .1s, box-shadow .2s, border-color .2s;
    box-shadow:0 4px 10px rgba(0,0,0,.3);}
  .stage-btn .num{font-size:20px;}
  .stage-btn .lab{font-size:8.5px;letter-spacing:.14em;color:var(--ink-dim);text-transform:uppercase;}
  .stage-btn:not(.locked):active{transform:scale(.94);}
  .stage-btn:not(.locked):hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 6px 16px rgba(0,0,0,.4);}
  .stage-btn.locked{opacity:.5;cursor:not-allowed;color:var(--ink-dim);}
  .stage-btn.cleared{border-color:rgba(57,198,106,.6);}
  .stage-btn.cleared .num{color:#8ee9a9;}
  .stage-btn .stars{position:absolute;top:6px;right:8px;font-size:10px;color:var(--gold);}
  .stage-btn .lockic{font-size:18px;}
  .reset-prog{display:block;margin:24px auto 0;background:none;border:1px solid var(--line);
    color:var(--ink-dim);font-size:12px;padding:8px 16px;border-radius:20px;cursor:pointer;}
  .reset-prog:active{transform:scale(.96);}

  /* ---------- game screen ---------- */
  .hud{display:flex;align-items:center;gap:7px;padding:calc(12px + env(safe-area-inset-top)) 12px 6px;}
  .hud .iconbtn{width:40px;height:40px;flex:0 0 auto;border-radius:12px;border:1px solid var(--line);
    background:var(--panel);color:var(--ink);font-size:18px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:transform .1s,border-color .2s;position:relative;}
  .hud .iconbtn:active{transform:scale(.9);}
  .hud .iconbtn:disabled{opacity:.35;cursor:default;}
  .hud .iconbtn svg{width:20px;height:20px;}
  .hud .center{flex:1;text-align:center;min-width:0;}
  .hud .stg{font-size:11px;letter-spacing:.16em;color:var(--accent);font-weight:800;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;}
  .hud .prog{font-size:15px;font-weight:800;margin-top:1px;}
  .hud .prog .done{color:var(--goal);}
  .hintbtn{background:linear-gradient(180deg,#4a3f1e,#2e2711)!important;border-color:#6b5a22!important;}
  .hintbtn .cnt{position:absolute;top:-5px;right:-5px;background:var(--gold);color:#3a2a00;font-size:10px;
    font-weight:900;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    padding:0 3px;box-shadow:0 1px 3px rgba(0,0,0,.5);}
  .hintbtn:disabled{filter:grayscale(.7);}

  .board-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:6px 14px;min-height:0;}
  .board{position:relative;width:min(94vw, 60vh);max-width:520px;aspect-ratio:1;
    background:var(--wall);border:3px solid #17110d;border-radius:12px;
    box-shadow:0 18px 40px rgba(0,0,0,.5), inset 0 0 0 2px rgba(255,255,255,.03);
    display:grid;gap:0;overflow:hidden;padding:4px;}
  .cell{position:relative;border:1px solid rgba(0,0,0,.28);overflow:hidden;}
  .cell.floor{
    background:
      radial-gradient(6px 5px at 30% 40%, rgba(30,20,10,.55), transparent 60%),
      radial-gradient(7px 6px at 70% 65%, rgba(30,20,10,.5), transparent 60%),
      radial-gradient(5px 4px at 55% 22%, rgba(20,14,8,.45), transparent 60%),
      linear-gradient(135deg,var(--dirt),var(--dirt2));}
  .cell.floor::after{content:"";position:absolute;inset:0;
    background:radial-gradient(9px 7px at 45% 75%, rgba(20,12,6,.4), transparent 62%);}
  /* cleaned floor - bright wood / parquet */
  .cell.clean{
    background:
      repeating-linear-gradient(92deg, rgba(120,75,30,.16) 0 1.5px, transparent 1.5px 13px),
      linear-gradient(120deg, rgba(255,255,255,.18), transparent 55%),
      linear-gradient(160deg,#f3dcac,#e7c586 68%,#dcb96f);
    box-shadow:inset 0 0 0 1px rgba(120,80,40,.16), inset 0 0 10px rgba(255,246,222,.4);
    animation:shine .5s ease-out;}
  .cell.clean::after{content:"";position:absolute;inset:0;
    background:linear-gradient(115deg,transparent 38%,rgba(255,255,255,.55) 50%,transparent 62%);
    opacity:0;animation:sweep .55s ease-out;}
  .cell.clean::before{content:"";position:absolute;left:12%;right:12%;bottom:14%;height:26%;
    border-radius:50%;background:radial-gradient(closest-side, rgba(255,255,255,.55), transparent 75%);
    opacity:0;animation:streak .5s ease-out;}
  @keyframes streak{0%{opacity:.8;transform:scaleX(.4);}100%{opacity:0;transform:scaleX(1.1);}}
  @keyframes sweep{0%{transform:translateX(-120%);opacity:.9;}100%{transform:translateX(120%);opacity:0;}}
  @keyframes shine{0%{filter:brightness(1.6);}100%{filter:brightness(1);}}
  .cell.crate{background:linear-gradient(180deg,var(--crate-l),var(--crate));}
  .cell.crate::before{content:"";position:absolute;inset:9%;border-radius:4px;
    background:linear-gradient(180deg,var(--crate-l),var(--crate) 60%,var(--crate-d));
    border:2px solid var(--crate-d);box-shadow:inset 0 0 0 2px rgba(255,255,255,.12), 0 3px 6px rgba(0,0,0,.4);}
  .cell.crate::after{content:"";position:absolute;inset:9%;border-radius:4px;
    background:linear-gradient(45deg,transparent 46%,var(--crate-d) 46% 54%,transparent 54%),
      linear-gradient(-45deg,transparent 46%,var(--crate-d) 46% 54%,transparent 54%);opacity:.55;}
  .cell .mark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    flex-direction:column;font-weight:900;pointer-events:none;z-index:2;}
  .cell .mark .tag{font-size:min(2.4vw,13px);letter-spacing:.06em;padding:1px 5px;border-radius:6px;line-height:1.3;}
  .cell.start .tag{color:#3a2410;background:var(--start);box-shadow:0 1px 4px rgba(0,0,0,.4);}
  .cell.goal .mark{justify-content:flex-end;}
  .cell.goal .door{position:absolute;top:2%;left:7%;width:86%;height:84%;display:block;z-index:2;}
  .cell.goal .door svg{width:100%;height:100%;filter:drop-shadow(0 3px 4px rgba(0,0,0,.5));}
  .cell.goal .tag{position:relative;z-index:3;margin-bottom:3%;
    color:#0d3b1e;background:var(--goal);box-shadow:0 1px 4px rgba(0,0,0,.4);}
  .cell.goal.ready{animation:goalpulse 1s ease-in-out infinite;}
  @keyframes goalpulse{0%,100%{box-shadow:inset 0 0 0 3px rgba(57,198,106,.4);}50%{box-shadow:inset 0 0 14px 4px rgba(57,198,106,.85);}}
  .cell.hint{animation:hintpulse .9s ease-in-out infinite;}
  @keyframes hintpulse{0%,100%{box-shadow:inset 0 0 0 3px rgba(255,225,77,.5);}50%{box-shadow:inset 0 0 16px 5px rgba(255,225,77,.95);}}
  .cell.bump{animation:bump .28s;}
  @keyframes bump{0%,100%{filter:none;}50%{filter:brightness(1.4) saturate(1.4);}}

  .player{position:absolute;z-index:5;pointer-events:none;transition:left .13s ease, top .13s ease;
    transform:translate(-50%,-62%);}
  .player svg{display:block;width:100%;height:100%;filter:drop-shadow(0 4px 3px rgba(0,0,0,.45));}
  .player.hop{animation:hop .13s ease;}
  @keyframes hop{0%,100%{transform:translate(-50%,-62%) scaleY(1);}45%{transform:translate(-50%,-70%) scaleY(1.05);}}
  .player.flip{transform:translate(-50%,-62%) scaleX(-1);}
  .player.flip.hop{animation:hopf .13s ease;}
  @keyframes hopf{0%,100%{transform:translate(-50%,-62%) scaleX(-1) scaleY(1);}45%{transform:translate(-50%,-70%) scaleX(-1) scaleY(1.05);}}
  .player svg .mopgroup{transform-box:fill-box;transform-origin:60% 6%;}
  .player.mopping svg .mopgroup{animation:mopwipe .24s ease;}
  @keyframes mopwipe{0%{transform:rotate(0) translateY(0);}32%{transform:rotate(-16deg) translateY(1px);}
    64%{transform:rotate(7deg);}100%{transform:rotate(0);}}

  /* d-pad */
  .pad-wrap{display:flex;justify-content:center;padding:6px 0 calc(16px + env(safe-area-inset-bottom));}
  .dpad{position:relative;width:168px;height:168px;}
  .dbtn{position:absolute;width:57px;height:57px;border:none;cursor:pointer;
    background:linear-gradient(180deg,#3a302a,#241d18);color:var(--ink);font-size:24px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 0 #140f0b, 0 6px 12px rgba(0,0,0,.4);transition:transform .06s, box-shadow .06s;}
  .dbtn:active{transform:translateY(3px);box-shadow:0 1px 0 #140f0b,0 2px 6px rgba(0,0,0,.4);}
  .dbtn.up{top:0;left:55px;border-radius:14px 14px 4px 4px;}
  .dbtn.down{bottom:0;left:55px;border-radius:4px 4px 14px 14px;}
  .dbtn.left{left:0;top:55px;border-radius:14px 4px 4px 14px;}
  .dbtn.right{right:0;top:55px;border-radius:4px 14px 14px 4px;}
  .dpad .hub{position:absolute;left:55px;top:55px;width:57px;height:57px;border-radius:50%;
    background:radial-gradient(circle at 40% 35%,#4a3f38,#211a15);box-shadow:inset 0 2px 4px rgba(255,255,255,.12),0 3px 6px rgba(0,0,0,.4);
    display:flex;align-items:center;justify-content:center;font-size:20px;}

  /* overlays */
  .overlay{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;padding:20px;}
  .overlay.show{display:flex;}
  .veil{position:absolute;inset:0;background:rgba(6,4,3,.72);backdrop-filter:blur(3px);}
  .card{position:relative;width:min(420px,92vw);max-height:90vh;overflow-y:auto;background:var(--panel);
    border:1px solid var(--line);border-radius:20px;padding:26px 22px;text-align:center;box-shadow:0 30px 70px rgba(0,0,0,.6);}
  .card h2{margin:6px 0 4px;font-size:25px;}
  .card p{color:var(--ink-dim);font-size:14px;margin:0 0 6px;}
  .card .big{font-size:52px;line-height:1;margin-bottom:6px;}
  .card .stars-big{font-size:30px;letter-spacing:6px;color:var(--gold);margin:8px 0 4px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4));}
  .btns{display:flex;gap:10px;margin-top:18px;}
  .btn{flex:1;padding:13px 10px;border-radius:13px;border:none;font-weight:800;font-size:15px;cursor:pointer;transition:transform .1s;}
  .btn:active{transform:scale(.96);}
  .btn.primary{background:linear-gradient(180deg,var(--accent),var(--accent-d));color:#04211b;}
  .btn.ghost{background:#2f2721;color:var(--ink);border:1px solid var(--line);}
  /* how-to modal list */
  .howlist{text-align:left;margin:14px 0 4px;font-size:14px;line-height:1.65;color:var(--ink-dim);}
  .howlist .row{display:flex;gap:11px;align-items:flex-start;margin-bottom:11px;}
  .howlist .ic{font-size:19px;line-height:1.4;flex:0 0 auto;}
  .howlist b{color:var(--ink);}

  .toast{position:fixed;left:50%;bottom:calc(206px + env(safe-area-inset-bottom));transform:translateX(-50%);
    background:rgba(20,15,11,.94);border:1px solid var(--line);color:var(--ink);
    padding:9px 16px;border-radius:20px;font-size:13.5px;font-weight:700;z-index:25;max-width:90vw;text-align:center;
    opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
</style>
</head>
<body>
<div class="bgtex"></div>
<div id="app">

  <!-- ===== STAGE SELECT ===== -->
  <section id="select" class="screen show">
    <div class="langbar" id="langbar"></div>
    <div class="title-wrap">
      <div class="kicker" id="uiKicker"></div>
      <h1 class="title"><span class="mop">🧹</span> <span id="uiTitle"></span></h1>
      <div class="subtitle" id="uiSubtitle"></div>
      <button class="howto-btn" id="howtoBtn"><span>❓</span><span id="uiHowto"></span></button>
    </div>
    <div class="tiers" id="tierTabs"></div>
    <div class="stages" id="stageGrid"></div>
    <button class="reset-prog" id="resetProg"></button>
  </section>

  <!-- ===== GAME ===== -->
  <section id="game" class="screen">
    <div class="hud">
      <button class="iconbtn" id="backBtn">←</button>
      <div class="center">
        <div class="stg" id="hudStage"></div>
        <div class="prog" id="hudProg"></div>
      </div>
      <button class="iconbtn hintbtn" id="hintBtn">💡<span class="cnt" id="hintCount">0</span></button>
      <button class="iconbtn" id="undoBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 20 V11 a5 5 0 0 1 10 0 V20"/><path d="M13 16 l4 4 4 -4"/></svg></button>
      <button class="iconbtn" id="restartBtn">⟳</button>
    </div>
    <div class="board-wrap"><div class="board" id="board"></div></div>
    <div class="pad-wrap">
      <div class="dpad">
        <button class="dbtn up"    data-dir="up">▲</button>
        <button class="dbtn left"  data-dir="left">◀</button>
        <div class="hub">🧽</div>
        <button class="dbtn right" data-dir="right">▶</button>
        <button class="dbtn down"  data-dir="down">▼</button>
      </div>
    </div>
  </section>
</div>

<!-- ===== popups ===== -->
<div class="overlay" id="howtoOverlay">
  <div class="veil"></div>
  <div class="card">
    <h2 id="howtoTitle"></h2>
    <div class="howlist" id="howtoList"></div>
    <div class="btns"><button class="btn primary" id="howtoClose"></button></div>
  </div>
</div>

<div class="overlay" id="winOverlay">
  <div class="veil"></div>
  <div class="card">
    <div class="big">✨🧹✨</div>
    <h2 id="winTitle"></h2>
    <div class="stars-big" id="winStars">★ ★ ★</div>
    <p id="winMsg"></p>
    <div class="btns">
      <button class="btn ghost" id="winRetry"></button>
      <button class="btn primary" id="winNext"></button>
    </div>
  </div>
</div>

<div class="overlay" id="stuckOverlay">
  <div class="veil"></div>
  <div class="card">
    <div class="big">😵</div>
    <h2 id="stuckTitle"></h2>
    <p id="stuckBody"></p>
    <div class="btns">
      <button class="btn ghost" id="stuckSelect"></button>
      <button class="btn primary" id="stuckRetry"></button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
(function(){
  const TIERS = ["beginner","intermediate","advanced"];
  const STAGES_PER_TIER = 30;
  const PROG_KEY = "chiefJanitorKim.progress.v1";

  /* ---------------- i18n ---------------- */
  const I18N = {
    ko:{
      kicker:"창고 미화 작전", title:"미화부장 김용준",
      subtitle:"지저분한 창고 바닥을 남김없이 닦아라!",
      howto:"게임 방법", stageWord:"스테이지", tiles:"칸",
      reset:"진행 기록 초기화",
      tierBeginner:"초급", tierIntermediate:"중급", tierAdvanced:"고급",
      tierSub:"1 – 30",
      howtoTitle:"게임 방법",
      how:[
        ["🎯","<b>목표</b> — 장애물(상자 📦)을 피해 <b>모든 바닥 칸</b>을 닦고 <b>도착(문)</b> 칸에서 마무리하면 성공!"],
        ["🚫","<b>규칙</b> — 이미 닦은 칸은 다시 밟을 수 없어요. 끊기지 않게 한 번에 이어서 청소하세요."],
        ["🕹️","<b>조작</b> — 방향키 / 화면 D-패드 / 화면을 원하는 방향으로 쓸어넘기기"],
        ["💡","<b>힌트</b> — 💡 버튼을 누르면 다음에 갈 칸을 알려줘요. 스테이지마다 횟수가 정해져 있어요."],
        ["🏆","<b>난이도</b> — 초급·중급·고급 각 30스테이지. 뒤로 갈수록 판이 커지고 상자가 많아져요."]
      ],
      close:"닫기",
      undoTitle:"한 칸 되돌리기", restartTitle:"다시 시작", backTitle:"스테이지 선택", hintTitle:"힌트",
      winTitle:"청소 완료!", winMsg:"반짝반짝 깨끗해졌어요!", winLast:"모든 창고를 청소했어요! 최고예요! 🏆",
      retry:"다시", next:"다음 스테이지 →", toStart:"처음으로",
      stuckTitle:"막혔어요!", stuckBody:"더 이상 갈 수 있는 칸이 없어요.\n경로를 바꿔서 다시 도전해 보세요.",

      const opts=[];

        const nx=x+dx,ny=y+dy;
        if(nx<0||ny<0||nx>=size||ny>=size) continue;
        const ni=idx(nx,ny);

    const {pos,size,playerEl}=cur, cp=100/size;
    playerEl.style.left=(cp*(pos.x+0.5))+"%";
    playerEl.style.top =(cp*(pos.y+0.55))+"%";
    if(hop){playerEl.classList.remove("hop","hopf","mopping");void playerEl.offsetWidth;playerEl.classList.add("hop","mopping");}
  }

  function markClean(x,y,animate){
    const k=key(x,y); if(cur.cleaned.has(k))return;
    cur.cleaned.add(k); cur.path.push(k);
    const cell=cur.cellEls[k]; cell.classList.add("clean"); cell.classList.remove("floor");
    if(animate) sfxClean();
    refreshGoalGlow();
  }
  function refreshGoalGlow(){
    const {data}=cur, gc=cur.cellEls[key(data.goal.x,data.goal.y)]; if(!gc)return;
    const remaining=data.floorCount-cur.cleaned.size;
    const goalCleaned=cur.cleaned.has(key(data.goal.x,data.goal.y));
    gc.classList.toggle("ready", !goalCleaned && remaining===1);
  }
  function clearHint(){board.querySelectorAll(".cell.hint").forEach(c=>c.classList.remove("hint"));}

  function updateHud(){
    const {data,tier,stage}=cur;
    const tierName = tier==="beginner"?t("tierBeginner"):tier==="intermediate"?t("tierIntermediate"):t("tierAdvanced");
    hudStage.textContent=`${tierName} · ${t("stageWord")} ${String(stage).padStart(2,"0")}`;
    hudProg.innerHTML=`<span class="done">${cur.cleaned.size}</span> / ${data.floorCount} ${t("tiles")}`;
    undoBtn.disabled=cur.path.length<=1;
    $("#hintCount").textContent=cur.hintsLeft;
    hintBtn.disabled=cur.hintsLeft<=0;
    hintBtn.title=t("hintTitle");
    undoBtn.title=t("undoTitle"); $("#restartBtn").title=t("restartTitle"); $("#backBtn").title=t("backTitle");
  }

  /* ---------------- movement ---------------- */
  const DIRS={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
  function tryMove(dir){
    if(!cur||animating)return;
    if($("#winOverlay").classList.contains("show"))return;
    const [dx,dy]=DIRS[dir], nx=cur.pos.x+dx, ny=cur.pos.y+dy, {data,size}=cur;
    if(dir==="left")cur.playerEl.classList.add("flip");
    else if(dir==="right")cur.playerEl.classList.remove("flip");
    if(nx<0||ny<0||nx>=size||ny>=size){sfxBump();return;}
    const ty=data.grid[ny*size+nx], nk=key(nx,ny);
    if(ty==="crate"){bumpCell(nx,ny);sfxBump();toast(t("tCrate"));return;}
    if(cur.cleaned.has(nk)){bumpCell(nx,ny);sfxBump();toast(t("tCleaned"));return;}
    const isGoal=data.goal.x===nx&&data.goal.y===ny;
    if(isGoal&&(data.floorCount-cur.cleaned.size)>1){bumpCell(nx,ny);sfxBump();toast(t("tGoal"));return;}
    clearHint();
    cur.pos={x:nx,y:ny}; positionPlayer(true); markClean(nx,ny,true); updateHud();
    if(isGoal){onWin();return;}
    if(!hasAnyMove()) setTimeout(()=>{if(!isWon())showStuck();},260);
  }
  function hasAnyMove(){
    const {data,size}=cur;
    for(const d in DIRS){const [dx,dy]=DIRS[d];const nx=cur.pos.x+dx,ny=cur.pos.y+dy;
      if(nx<0||ny<0||nx>=size||ny>=size)continue;
      if(data.grid[ny*size+nx]==="crate")continue;
      if(cur.cleaned.has(key(nx,ny)))continue;
      const isGoal=data.goal.x===nx&&data.goal.y===ny;
      if(isGoal&&(data.floorCount-cur.cleaned.size)>1)continue;
      return true;}
    return false;
  }
  const isWon=()=>cur&&cur.cleaned.size===cur.data.floorCount;
  function bumpCell(x,y){const c=cur.cellEls[key(x,y)];if(!c)return;c.classList.remove("bump");void c.offsetWidth;c.classList.add("bump");}

  /* ---------------- hint ---------------- */
  function useHint(){
    if(!cur||animating||cur.hintsLeft<=0)return;
    const path=solvePath();
    if(!path||!path.length){toast(t("tHintNone"));return;}
    cur.hintsLeft--; updateHud();
    clearHint();
    const [hx,hy]=path[0];
    const c=cur.cellEls[key(hx,hy)]; if(c)c.classList.add("hint");
    sfxHint(); toast(t("tHint"));
  }

  /* ---------------- undo ---------------- */
  function undo(){
    if(!cur||animating||cur.path.length<=1)return;
    const lastK=cur.path.pop(); cur.cleaned.delete(lastK);
    const cell=cur.cellEls[lastK]; cell.classList.remove("clean"); cell.classList.add("floor");
    const [px,py]=cur.path[cur.path.length-1].split(",").map(Number);
    cur.pos={x:px,y:py}; clearHint(); positionPlayer(true); refreshGoalGlow(); updateHud(); hideOverlays();
  }

  /* ---------------- win / stuck ---------------- */
  function onWin(){
    animating=true; sfxWin();
    const stars=3, tp=progress[cur.tier];
    tp.stars[cur.stage]=Math.max(tp.stars[cur.stage]||0,stars);
    if(cur.stage>=tp.unlocked&&cur.stage<STAGES_PER_TIER) tp.unlocked=cur.stage+1;
    saveProgress(); buildStageGrid();
    const isLast=cur.stage>=STAGES_PER_TIER;
    $("#winTitle").textContent=t("winTitle");
    $("#winStars").textContent="★ ".repeat(stars).trim();
    $("#winMsg").textContent=isLast?t("winLast"):t("winMsg");
    $("#winRetry").textContent=t("retry");
    $("#winNext").textContent=isLast?t("toStart"):t("next");
    setTimeout(()=>{$("#winOverlay").classList.add("show");animating=false;},380);
  }
  function showStuck(){
    $("#stuckTitle").textContent=t("stuckTitle");
    $("#stuckBody").textContent=t("stuckBody");
    $("#stuckSelect").textContent=t("selectBtn");
    $("#stuckRetry").textContent=t("restartBtn");
    $("#stuckOverlay").classList.add("show");
  }
  function hideOverlays(){$("#winOverlay").classList.remove("show");$("#stuckOverlay").classList.remove("show");}

  /* ---------------- how-to modal ---------------- */
  function openHowto(){
    $("#howtoTitle").textContent=t("howtoTitle");
    const list=$("#howtoList"); list.innerHTML="";
    t("how").forEach(([ic,html])=>{
      const row=document.createElement("div"); row.className="row";
      row.innerHTML=`<span class="ic">${ic}</span><div>${html}</div>`;
      list.appendChild(row);
    });
    $("#howtoClose").textContent=t("close");
    $("#howtoOverlay").classList.add("show");
  }

  /* ---------------- input ---------------- */
  document.addEventListener("keydown",(e)=>{
    const k=e.key;
    const confirm = k==="Enter"||k===" "||k==="Spacebar";
    const escape  = k==="Escape"||k==="Esc";
    // popups take priority (work on any screen)
    if($("#howtoOverlay").classList.contains("show")){
      if(confirm||escape){e.preventDefault();$("#howtoOverlay").classList.remove("show");}
      return;
    }
    if($("#winOverlay").classList.contains("show")){
      if(confirm){e.preventDefault();$("#winNext").click();}
      else if(escape){e.preventDefault();hideOverlays();showScreen("select");}
      return;
    }
    if($("#stuckOverlay").classList.contains("show")){
      if(confirm){e.preventDefault();$("#stuckRetry").click();}
      else if(escape){e.preventDefault();hideOverlays();showScreen("select");}
      return;
    }
    // in-game controls
    if(gameScreen.classList.contains("show")){
      if(escape){e.preventDefault();showScreen("select");return;}
      const m={ArrowUp:"up",ArrowDown:"down",ArrowLeft:"left",ArrowRight:"right",w:"up",s:"down",a:"left",d:"right",W:"up",S:"down",A:"left",D:"right"};
      if(m[k]){e.preventDefault();tryMove(m[k]);}
      else if(k==="z"||k==="Z")undo();
      else if(k==="h"||k==="H")useHint();
      return;
    }
  });
  document.querySelectorAll(".dbtn").forEach(b=>b.addEventListener("click",()=>tryMove(b.dataset.dir)));
  let touchStart=null;
  board.addEventListener("touchstart",(e)=>{const tt=e.changedTouches[0];touchStart={x:tt.clientX,y:tt.clientY};},{passive:true});
  board.addEventListener("touchend",(e)=>{
    if(!touchStart)return; const tt=e.changedTouches[0];
    const dx=tt.clientX-touchStart.x, dy=tt.clientY-touchStart.y, ax=Math.abs(dx), ay=Math.abs(dy);
    if(Math.max(ax,ay)<24){touchStart=null;return;}
    if(ax>ay)tryMove(dx>0?"right":"left"); else tryMove(dy>0?"down":"up");
    touchStart=null;
  },{passive:true});

  /* ---------------- buttons ---------------- */
  $("#backBtn").addEventListener("click",()=>{hideOverlays();showScreen("select");});
  $("#restartBtn").addEventListener("click",()=>{if(cur)startStage(cur.tier,cur.stage);});
  undoBtn.addEventListener("click",undo);
  hintBtn.addEventListener("click",useHint);
  $("#howtoBtn").addEventListener("click",openHowto);
  $("#howtoClose").addEventListener("click",()=>$("#howtoOverlay").classList.remove("show"));
  $("#howtoOverlay").addEventListener("click",(e)=>{if(e.target.classList.contains("veil"))$("#howtoOverlay").classList.remove("show");});
  $("#winNext").addEventListener("click",()=>{if(cur.stage>=STAGES_PER_TIER){hideOverlays();showScreen("select");}else startStage(cur.tier,cur.stage+1);});
  $("#winRetry").addEventListener("click",()=>startStage(cur.tier,cur.stage));
  $("#stuckRetry").addEventListener("click",()=>startStage(cur.tier,cur.stage));
  $("#stuckSelect").addEventListener("click",()=>{hideOverlays();showScreen("select");});
  $("#resetProg").addEventListener("click",()=>{if(confirm(t("confirmReset"))){progress=freshProgress();progress.lang=lang;saveProgress();buildStageGrid();}});

  /* ---------------- boot ---------------- */
  document.documentElement.lang=lang;
  buildLangBar(); renderStatic(); buildTierTabs(); buildStageGrid();
})();
</script>
</body>
</html>
