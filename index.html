<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>창고 청소부 · Warehouse Cleaner</title>
<style>
  :root{
    --bg0:#161311;
    --bg1:#211c18;
    --wall:#2b2320;
    --line:#3a2f28;
    --dirt:#6b5540;
    --dirt2:#5a4634;
    --clean:#cfe6ee;
    --clean2:#a9d3e0;
    --wet:#7fc4dd;
    --crate:#a9773e;
    --crate-d:#7d5325;
    --crate-l:#c99552;
    --gold:#ffcf4d;
    --accent:#33c6a6;
    --accent-d:#1c8f78;
    --start:#f2a93b;
    --goal:#39c66a;
    --ink:#f4ece2;
    --ink-dim:#b3a496;
    --panel:#241e1a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg0);
    font-family:"Segoe UI",system-ui,-apple-system,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    color:var(--ink);user-select:none;-webkit-user-select:none;touch-action:manipulation;}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;}

  /* ---------- background ---------- */
  .bgtex{position:fixed;inset:0;z-index:-1;
    background:
      radial-gradient(1200px 600px at 50% -10%, #2c2420, transparent 70%),
      repeating-linear-gradient(0deg, transparent 0 38px, rgba(0,0,0,.18) 38px 40px),
      repeating-linear-gradient(90deg, transparent 0 38px, rgba(0,0,0,.18) 38px 40px),
      linear-gradient(180deg,var(--bg1),var(--bg0));}

  /* ---------- screens ---------- */
  .screen{position:absolute;inset:0;display:none;flex-direction:column;}
  .screen.show{display:flex;}

  /* ---------- title / stage select ---------- */
  #select{overflow-y:auto;padding:20px 16px 40px;-webkit-overflow-scrolling:touch;}
  .title-wrap{text-align:center;padding:14px 0 8px;}
  .kicker{font-size:12px;letter-spacing:.32em;color:var(--accent);font-weight:800;text-transform:uppercase;}
  .title{font-size:clamp(28px,7vw,46px);font-weight:900;letter-spacing:-.01em;margin:4px 0 2px;
    text-shadow:0 2px 0 #000, 0 0 26px rgba(51,198,166,.25);}
  .title .mop{filter:drop-shadow(0 3px 3px rgba(0,0,0,.5));}
  .subtitle{color:var(--ink-dim);font-size:14px;margin-top:2px;}
  .howto{max-width:520px;margin:16px auto 6px;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:14px 16px;font-size:13.5px;line-height:1.7;color:var(--ink-dim);}
  .howto b{color:var(--ink);}
  .howto .row{display:flex;gap:9px;align-items:flex-start;}
  .howto .ic{font-size:16px;line-height:1.5;}

  .stages{max-width:560px;margin:18px auto 0;display:grid;
    grid-template-columns:repeat(5,1fr);gap:10px;}
  @media(max-width:400px){.stages{grid-template-columns:repeat(4,1fr);}}
  .stage-btn{position:relative;aspect-ratio:1;border:1px solid var(--line);border-radius:14px;
    background:linear-gradient(180deg,#2c2420,#211b17);color:var(--ink);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    font-weight:800;cursor:pointer;transition:transform .1s, box-shadow .2s, border-color .2s;
    box-shadow:0 4px 10px rgba(0,0,0,.3);}
  .stage-btn .num{font-size:20px;}
  .stage-btn .lab{font-size:9px;letter-spacing:.18em;color:var(--ink-dim);text-transform:uppercase;}
  .stage-btn:not(.locked):active{transform:scale(.94);}
  .stage-btn:not(.locked):hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 6px 16px rgba(0,0,0,.4);}
  .stage-btn.locked{opacity:.5;cursor:not-allowed;color:var(--ink-dim);}
  .stage-btn.cleared{border-color:rgba(57,198,106,.6);}
  .stage-btn.cleared .num{color:#8ee9a9;}
  .stage-btn .stars{position:absolute;top:6px;right:8px;font-size:10px;color:var(--gold);}
  .stage-btn .lockic{font-size:18px;}
  .reset-prog{display:block;margin:22px auto 0;background:none;border:1px solid var(--line);
    color:var(--ink-dim);font-size:12px;padding:8px 16px;border-radius:20px;cursor:pointer;}
  .reset-prog:active{transform:scale(.96);}

  /* ---------- game screen ---------- */
  #game{padding:0;}
  .hud{display:flex;align-items:center;gap:8px;padding:12px 14px calc(8px + env(safe-area-inset-top));
    padding-top:calc(12px + env(safe-area-inset-top));}
  .hud .iconbtn{width:40px;height:40px;flex:0 0 auto;border-radius:12px;border:1px solid var(--line);
    background:var(--panel);color:var(--ink);font-size:18px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:transform .1s,border-color .2s;}
  .hud .iconbtn:active{transform:scale(.9);}
  .hud .iconbtn:disabled{opacity:.35;cursor:default;}
  .hud .center{flex:1;text-align:center;}
  .hud .stg{font-size:11px;letter-spacing:.24em;color:var(--accent);font-weight:800;}
  .hud .prog{font-size:15px;font-weight:800;margin-top:1px;}
  .hud .prog .done{color:var(--goal);}

  .board-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:6px 14px;min-height:0;}
  .board{position:relative;width:min(94vw, 62vh);max-width:520px;aspect-ratio:1;
    background:var(--wall);border:3px solid #17110d;border-radius:12px;
    box-shadow:0 18px 40px rgba(0,0,0,.5), inset 0 0 0 2px rgba(255,255,255,.03);
    display:grid;gap:0;overflow:hidden;padding:4px;}
  .cell{position:relative;border:1px solid rgba(0,0,0,.28);overflow:hidden;}
  /* dirty floor */
  .cell.floor{
    background:
      radial-gradient(6px 5px at 30% 40%, rgba(30,20,10,.55), transparent 60%),
      radial-gradient(7px 6px at 70% 65%, rgba(30,20,10,.5), transparent 60%),
      radial-gradient(5px 4px at 55% 22%, rgba(20,14,8,.45), transparent 60%),
      linear-gradient(135deg,var(--dirt),var(--dirt2));}
  .cell.floor::after{content:"";position:absolute;inset:0;
    background:radial-gradient(9px 7px at 45% 75%, rgba(20,12,6,.4), transparent 62%);}
  /* cleaned floor */
  .cell.clean{
    background:linear-gradient(135deg,var(--clean),var(--clean2));
    box-shadow:inset 0 0 12px rgba(255,255,255,.5);
    animation:shine .5s ease-out;}
  .cell.clean::after{content:"";position:absolute;inset:0;
    background:linear-gradient(115deg,transparent 40%,rgba(255,255,255,.6) 50%,transparent 60%);
    opacity:0;animation:sweep .55s ease-out;}
  @keyframes sweep{0%{transform:translateX(-120%);opacity:.9;}100%{transform:translateX(120%);opacity:0;}}
  @keyframes shine{0%{filter:brightness(1.6);}100%{filter:brightness(1);}}
  /* crate obstacle */
  .cell.crate{background:linear-gradient(180deg,var(--crate-l),var(--crate));}
  .cell.crate::before{content:"";position:absolute;inset:9%;border-radius:4px;
    background:
      linear-gradient(180deg,var(--crate-l),var(--crate) 60%,var(--crate-d));
    border:2px solid var(--crate-d);
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.12), 0 3px 6px rgba(0,0,0,.4);}
  .cell.crate::after{content:"";position:absolute;inset:9%;border-radius:4px;
    background:
      linear-gradient(45deg,transparent 46%,var(--crate-d) 46% 54%,transparent 54%),
      linear-gradient(-45deg,transparent 46%,var(--crate-d) 46% 54%,transparent 54%);
    opacity:.55;}
  /* start & goal markers */
  .cell .mark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    flex-direction:column;font-weight:900;pointer-events:none;z-index:2;}
  .cell .mark .tag{font-size:min(2.4vw,13px);letter-spacing:.1em;padding:1px 5px;border-radius:6px;line-height:1.3;}
  .cell.start .tag{color:#3a2410;background:var(--start);box-shadow:0 1px 4px rgba(0,0,0,.4);}
  .cell.goal .mark .em{font-size:min(6vw,30px);filter:drop-shadow(0 2px 3px rgba(0,0,0,.4));}
  .cell.goal .tag{color:#0d3b1e;background:var(--goal);box-shadow:0 1px 4px rgba(0,0,0,.4);}
  .cell.goal.ready{animation:goalpulse 1s ease-in-out infinite;}
  @keyframes goalpulse{0%,100%{box-shadow:inset 0 0 0 3px rgba(57,198,106,.4);}50%{box-shadow:inset 0 0 14px 4px rgba(57,198,106,.85);}}
  .cell.bump{animation:bump .28s;}
  @keyframes bump{0%,100%{filter:none;}50%{filter:brightness(1.4) saturate(1.4);}}

  /* player */
  .player{position:absolute;z-index:5;pointer-events:none;
    transition:left .13s ease, top .13s ease;
    transform:translate(-50%,-62%);}
  .player svg{display:block;width:100%;height:100%;filter:drop-shadow(0 4px 3px rgba(0,0,0,.45));}
  .player.hop{animation:hop .13s ease;}
  @keyframes hop{0%,100%{transform:translate(-50%,-62%) scaleY(1);}45%{transform:translate(-50%,-70%) scaleY(1.05);}}
  .player.flip{transform:translate(-50%,-62%) scaleX(-1);}
  .player.flip.hop{animation:hopf .13s ease;}
  @keyframes hopf{0%,100%{transform:translate(-50%,-62%) scaleX(-1) scaleY(1);}45%{transform:translate(-50%,-70%) scaleX(-1) scaleY(1.05);}}

  /* ---------- controls: jog d-pad ---------- */
  .pad-wrap{display:flex;justify-content:center;padding:6px 0 calc(18px + env(safe-area-inset-bottom));}
  .dpad{position:relative;width:170px;height:170px;}
  .dbtn{position:absolute;width:58px;height:58px;border:none;cursor:pointer;
    background:linear-gradient(180deg,#3a302a,#241d18);color:var(--ink);font-size:24px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 0 #140f0b, 0 6px 12px rgba(0,0,0,.4);transition:transform .06s, box-shadow .06s;}
  .dbtn:active{transform:translateY(3px);box-shadow:0 1px 0 #140f0b,0 2px 6px rgba(0,0,0,.4);}
  .dbtn.up{top:0;left:56px;border-radius:14px 14px 4px 4px;}
  .dbtn.down{bottom:0;left:56px;border-radius:4px 4px 14px 14px;}
  .dbtn.left{left:0;top:56px;border-radius:14px 4px 4px 14px;}
  .dbtn.right{right:0;top:56px;border-radius:4px 14px 14px 4px;}
  .dpad .hub{position:absolute;left:56px;top:56px;width:58px;height:58px;border-radius:50%;
    background:radial-gradient(circle at 40% 35%,#4a3f38,#211a15);box-shadow:inset 0 2px 4px rgba(255,255,255,.12),0 3px 6px rgba(0,0,0,.4);
    display:flex;align-items:center;justify-content:center;font-size:20px;}

  /* ---------- overlay popups ---------- */
  .overlay{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;padding:20px;}
  .overlay.show{display:flex;}
  .veil{position:absolute;inset:0;background:rgba(6,4,3,.72);backdrop-filter:blur(3px);}
  .card{position:relative;width:min(400px,92vw);background:var(--panel);border:1px solid var(--line);
    border-radius:20px;padding:26px 22px;text-align:center;box-shadow:0 30px 70px rgba(0,0,0,.6);}
  .card h2{margin:6px 0 4px;font-size:26px;}
  .card p{color:var(--ink-dim);font-size:14px;margin:0 0 6px;}
  .card .big{font-size:52px;line-height:1;margin-bottom:6px;}
  .card .stars-big{font-size:30px;letter-spacing:6px;color:var(--gold);margin:8px 0 4px;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.4));}
  .btns{display:flex;gap:10px;margin-top:18px;}
  .btn{flex:1;padding:13px 10px;border-radius:13px;border:none;font-weight:800;font-size:15px;cursor:pointer;
    transition:transform .1s, filter .15s;}
  .btn:active{transform:scale(.96);}
  .btn.primary{background:linear-gradient(180deg,var(--accent),var(--accent-d));color:#04211b;}
  .btn.ghost{background:#2f2721;color:var(--ink);border:1px solid var(--line);}

  .toast{position:fixed;left:50%;bottom:calc(210px + env(safe-area-inset-bottom));transform:translateX(-50%);
    background:rgba(20,15,11,.94);border:1px solid var(--line);color:var(--ink);
    padding:9px 16px;border-radius:20px;font-size:13.5px;font-weight:700;z-index:25;
    opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
</style>
</head>
<body>
<div class="bgtex"></div>
<div id="app">

  <!-- ===== STAGE SELECT ===== -->
  <section id="select" class="screen show">
    <div class="title-wrap">
      <div class="kicker">Warehouse Cleaner</div>
      <h1 class="title"><span class="mop">🧹</span> 창고 청소부</h1>
      <div class="subtitle">지저분한 창고 바닥을 남김없이 닦아라!</div>
    </div>
    <div class="howto">
      <div class="row"><span class="ic">🎯</span><div><b>목표</b> — 장애물(상자 📦)을 피해 <b>모든 바닥 칸</b>을 닦고 <b>도착</b> 칸에서 마무리!</div></div>
      <div class="row"><span class="ic">🚫</span><div><b>규칙</b> — 이미 닦은 칸은 다시 밟을 수 없어요. 한 번에 이어서 청소!</div></div>
      <div class="row"><span class="ic">🕹️</span><div><b>조작</b> — 방향키 / 화면 D-패드 / 화면 쓸어넘기기</div></div>
    </div>
    <div class="stages" id="stageGrid"></div>
    <button class="reset-prog" id="resetProg">진행 기록 초기화</button>
  </section>

  <!-- ===== GAME ===== -->
  <section id="game" class="screen">
    <div class="hud">
      <button class="iconbtn" id="backBtn" title="스테이지 선택">←</button>
      <div class="center">
        <div class="stg" id="hudStage">STAGE 01</div>
        <div class="prog" id="hudProg"><span class="done">0</span> / 0 칸</div>
      </div>
      <button class="iconbtn" id="undoBtn" title="한 칸 되돌리기">↩︎</button>
      <button class="iconbtn" id="restartBtn" title="다시 시작">⟳</button>
    </div>

    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>

    <div class="pad-wrap">
      <div class="dpad">
        <button class="dbtn up"    data-dir="up">▲</button>
        <button class="dbtn left"  data-dir="left">◀</button>
        <div class="hub">🧽</div>
        <button class="dbtn right" data-dir="right">▶</button>
        <button class="dbtn down"  data-dir="down">▼</button>
      </div>
    </div>
  </section>
</div>

<!-- ===== popups ===== -->
<div class="overlay" id="winOverlay">
  <div class="veil"></div>
  <div class="card">
    <div class="big">✨🧹✨</div>
    <h2>청소 완료!</h2>
    <div class="stars-big" id="winStars">★ ★ ★</div>
    <p id="winMsg">반짝반짝 깨끗해졌어요!</p>
    <div class="btns">
      <button class="btn ghost" id="winRetry">다시</button>
      <button class="btn primary" id="winNext">다음 스테이지 →</button>
    </div>
  </div>
</div>

<div class="overlay" id="stuckOverlay">
  <div class="veil"></div>
  <div class="card">
    <div class="big">😵</div>
    <h2>막혔어요!</h2>
    <p>더 이상 갈 수 있는 칸이 없어요.<br>경로를 바꿔서 다시 도전해 보세요.</p>
    <div class="btns">
      <button class="btn ghost" id="stuckSelect">스테이지 선택</button>
      <button class="btn primary" id="stuckRetry">다시 시작</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
(function(){
  const TOTAL_STAGES = 30;
  const PROG_KEY = "warehouseCleaner.progress.v1";

  /* ---------------- seeded RNG ---------------- */
  function mulberry32(a){
    return function(){
      a |= 0; a = a + 0x6D2B79F5 | 0;
      let t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  /* ---------------- stage config ---------------- */
  function stageConfig(n){
    let size;
    if(n<=6) size=4;
    else if(n<=12) size=5;
    else if(n<=18) size=6;
    else if(n<=24) size=7;
    else size=8;
    // obstacle ratio: rises with difficulty for variety
    const posInBand = ((n-1)%6)/5;           // 0..1 within each size band
    const obstacleRatio = 0.10 + 0.16*posInBand; // 10% -> 26%
    return { size, obstacleRatio, seed: (n*2654435761) >>> 0 };
  }

  /* ---------------- stage generator ----------------
     Guarantees solvability: we build a self-avoiding walk (Warnsdorff
     heuristic) over the non-obstacle cells; those walk cells become the
     floor, start = first, goal = last. Any cell not on the walk is a crate.
     The walk itself is a valid full solution, so a path always exists.   */
  function generateStage(n){
    const { size, obstacleRatio, seed } = stageConfig(n);
    const rng = mulberry32(seed);
    const N = size*size;
    const idx = (x,y)=> y*size + x;
    const inb = (x,y)=> x>=0 && y>=0 && x<size && y<size;

    // pre-place obstacles
    const blocked = new Array(N).fill(false);
    let want = Math.round(N*obstacleRatio);
    let guard = 0;
    while(want>0 && guard++<500){
      const p = (rng()*N)|0;
      if(!blocked[p]){ blocked[p]=true; want--; }
    }

    const neighbors = (x,y)=>{
      const out=[];
      if(inb(x,y-1)) out.push([x,y-1]);
      if(inb(x+1,y)) out.push([x+1,y]);
      if(inb(x,y+1)) out.push([x,y+1]);
      if(inb(x-1,y)) out.push([x-1,y]);
      return out;
    };

    function walkFrom(sx,sy){
      const visited = new Array(N).fill(false);
      // treat blocked as visited so walk avoids them
      for(let i=0;i<N;i++) if(blocked[i]) visited[i]=true;
      if(visited[idx(sx,sy)]) return null;
      visited[idx(sx,sy)] = true;
      const path = [[sx,sy]];
      let cx=sx, cy=sy;
      while(true){
        const opts = neighbors(cx,cy).filter(([nx,ny])=>!visited[idx(nx,ny)]);
        if(!opts.length) break;
        // Warnsdorff: prefer neighbor with fewest onward options (mostly),
        // occasional randomness for variety
        let pick;
        if(rng() < 0.82){
          let best=Infinity, bestList=[];
          for(const [nx,ny] of opts){
            let deg=0;
            for(const [ax,ay] of neighbors(nx,ny)) if(!visited[idx(ax,ay)]) deg++;
            if(deg<best){ best=deg; bestList=[[nx,ny]]; }
            else if(deg===best){ bestList.push([nx,ny]); }
          }
          pick = bestList[(rng()*bestList.length)|0];
        } else {
          pick = opts[(rng()*opts.length)|0];
        }
        visited[idx(pick[0],pick[1])] = true;
        path.push(pick);
        cx=pick[0]; cy=pick[1];
      }
      return path;
    }

    // try many starts, keep the longest walk (max coverage)
    let best = [];
    const starts = [];
    for(let i=0;i<N;i++) if(!blocked[i]) starts.push(i);
    const attempts = Math.min(80, Math.max(24, starts.length*2));
    for(let a=0;a<attempts;a++){
      const s = starts[(rng()*starts.length)|0];
      const w = walkFrom(s%size, (s/size)|0);
      if(w && w.length>best.length) best=w;
    }

    // build the grid: walk cells = floor, rest = crate
    const grid = new Array(N).fill("crate");
    for(const [x,y] of best) grid[idx(x,y)] = "floor";
    const start = best[0];
    const goal  = best[best.length-1];

    return {
      size,
      grid,                                   // "floor" | "crate"
      start: {x:start[0], y:start[1]},
      goal:  {x:goal[0],  y:goal[1]},
      floorCount: best.length
    };
  }

  /* ---------------- janitor sprite ---------------- */
  const JANITOR_SVG = `
  <svg viewBox="0 0 120 150" xmlns="http://www.w3.org/2000/svg">
    <!-- mop -->
    <g>
      <rect x="82" y="30" width="7" height="86" rx="3.5" fill="#b07a3a" transform="rotate(8 85 73)"/>
      <path d="M74 112 q18 -6 34 0 q3 24 -17 30 q-20 -6 -17 -30 z" fill="#dfe9ec"/>
      <path d="M74 112 q17 -5 34 0 l-3 10 q-14 -4 -28 0 z" fill="#b9ccd2"/>
      <g stroke="#c7d6da" stroke-width="2.4" stroke-linecap="round">
        <line x1="80" y1="120" x2="78" y2="146"/><line x1="87" y1="122" x2="86" y2="148"/>
        <line x1="94" y1="122" x2="95" y2="148"/><line x1="101" y1="120" x2="104" y2="146"/>
      </g>
    </g>
    <!-- legs -->
    <rect x="44" y="108" width="13" height="30" rx="5" fill="#274a6b"/>
    <rect x="63" y="108" width="13" height="30" rx="5" fill="#22405d"/>
    <rect x="42" y="134" width="18" height="9" rx="4" fill="#20140c"/>
    <rect x="61" y="134" width="18" height="9" rx="4" fill="#20140c"/>
    <!-- body / overalls -->
    <path d="M40 70 q20 -10 40 0 l4 44 q-24 8 -48 0 z" fill="#2f6fa1"/>
    <path d="M40 70 q20 -10 40 0 l1.5 16 q-21 -8 -43 0 z" fill="#3a83bb"/>
    <rect x="52" y="80" width="16" height="18" rx="3" fill="#265a86"/>
    <!-- arms -->
    <rect x="30" y="72" width="12" height="34" rx="6" fill="#3a83bb"/>
    <rect x="78" y="60" width="12" height="40" rx="6" fill="#3a83bb" transform="rotate(10 84 80)"/>
    <circle cx="35" cy="106" r="7" fill="#f0c9a0"/>
    <circle cx="90" cy="98" r="7" fill="#f0c9a0"/>
    <!-- head -->
    <circle cx="60" cy="50" r="21" fill="#f4d1a8"/>
    <ellipse cx="60" cy="70" rx="10" ry="5" fill="#e9be93"/>
    <!-- cap -->
    <path d="M37 47 q3 -26 23 -26 q20 0 23 26 q-23 -9 -46 0 z" fill="#e7563f"/>
    <path d="M35 47 q25 -9 50 0 l0 5 q-25 -8 -50 0 z" fill="#c8402d"/>
    <rect x="54" y="26" width="12" height="6" rx="3" fill="#f0c9a0" opacity=".0"/>
    <!-- face -->
    <circle cx="52" cy="50" r="2.6" fill="#3a2418"/>
    <circle cx="68" cy="50" r="2.6" fill="#3a2418"/>
    <path d="M54 59 q6 5 12 0" stroke="#a5603c" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <circle cx="46" cy="56" r="3.2" fill="#f2a48c" opacity=".7"/>
    <circle cx="74" cy="56" r="3.2" fill="#f2a48c" opacity=".7"/>
  </svg>`;

  /* ---------------- progress storage ---------------- */
  function loadProgress(){
    try{
      const raw = localStorage.getItem(PROG_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){}
    return { unlocked:1, stars:{} };
  }
  function saveProgress(p){
    try{ localStorage.setItem(PROG_KEY, JSON.stringify(p)); }catch(e){}
  }
  let progress = loadProgress();

  /* ---------------- sound (tiny, muteable) ---------------- */
  let actx=null;
  function beep(freq, dur, type, vol){
    try{
      if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
      const o=actx.createOscillator(), g=actx.createGain();
      o.type=type||"triangle"; o.frequency.value=freq;
      g.gain.value=vol||0.05;
      o.connect(g); g.connect(actx.destination);
      const t=actx.currentTime; o.start(t);
      g.gain.exponentialRampToValueAtTime(0.0001, t+ (dur||0.09));
      o.stop(t+(dur||0.09));
    }catch(e){}
  }
  function sfxClean(){ beep(520+Math.random()*80, 0.07, "sine", 0.05); }
  function sfxBump(){ beep(120, 0.1, "square", 0.05); }
  function sfxWin(){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.16,"triangle",0.06),i*110)); }

  /* ---------------- DOM refs ---------------- */
  const $ = s=>document.querySelector(s);
  const selectScreen = $("#select");
  const gameScreen = $("#game");
  const stageGrid = $("#stageGrid");
  const board = $("#board");
  const hudStage = $("#hudStage");
  const hudProg = $("#hudProg");
  const undoBtn = $("#undoBtn");
  const toastEl = $("#toast");

  /* ---------------- game state ---------------- */
  let cur = null;   // {stage, data, cleaned:Set, path:[], pos, playerEl, cellEls, size}
  let animating = false;

  function showScreen(which){
    selectScreen.classList.toggle("show", which==="select");
    gameScreen.classList.toggle("show", which==="game");
  }

  /* ---------------- stage select build ---------------- */
  function buildStageGrid(){
    stageGrid.innerHTML="";
    for(let n=1;n<=TOTAL_STAGES;n++){
      const locked = n>progress.unlocked;
      const stars = progress.stars[n]||0;
      const btn = document.createElement("button");
      btn.className = "stage-btn"+(locked?" locked":"")+(stars?" cleared":"");
      btn.innerHTML = locked
        ? `<span class="lockic">🔒</span><span class="lab">Stage ${String(n).padStart(2,"0")}</span>`
        : `${stars?`<span class="stars">${"★".repeat(stars)}</span>`:""}
           <span class="num">${String(n).padStart(2,"0")}</span>
           <span class="lab">Stage</span>`;
      if(!locked) btn.addEventListener("click", ()=>startStage(n));
      stageGrid.appendChild(btn);
    }
  }

  /* ---------------- toast ---------------- */
  let toastTimer=null;
  function toast(msg){
    toastEl.textContent=msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>toastEl.classList.remove("show"),1200);
  }

  /* ---------------- start a stage ---------------- */
  function startStage(n){
    const data = generateStage(n);
    cur = {
      stage:n, data,
      size:data.size,
      cleaned:new Set(),
      path:[],                      // list of "x,y" in visit order
      pos:{...data.start},
      cellEls:{},
      playerEl:null
    };
    renderBoard();
    // clean the starting cell
    markClean(data.start.x, data.start.y, false);
    updateHud();
    hudStage.textContent = "STAGE "+String(n).padStart(2,"0");
    showScreen("game");
    hideOverlays();
  }

  const key=(x,y)=>x+","+y;

  function renderBoard(){
    const {data,size} = cur;
    board.style.gridTemplateColumns = `repeat(${size},1fr)`;
    board.innerHTML="";
    cur.cellEls={};
    for(let y=0;y<size;y++){
      for(let x=0;x<size;x++){
        const t = data.grid[y*size+x];
        const cell = document.createElement("div");
        cell.className = "cell "+(t==="crate"?"crate":"floor");
        const isStart = data.start.x===x && data.start.y===y;
        const isGoal  = data.goal.x===x && data.goal.y===y;
        if(t!=="crate" && isStart){
          cell.classList.add("start");
          cell.innerHTML=`<div class="mark"><span class="tag">출발</span></div>`;
        }
        if(t!=="crate" && isGoal){
          cell.classList.add("goal");
          cell.innerHTML=`<div class="mark"><span class="em">🚪</span><span class="tag">도착</span></div>`;
        }
        board.appendChild(cell);
        cur.cellEls[key(x,y)]=cell;
      }
    }
    // player element
    const p = document.createElement("div");
    p.className="player";
    p.innerHTML=JANITOR_SVG;
    const cellPct = 100/size;
    p.style.width = (cellPct*0.92)+"%";
    p.style.height = (cellPct*1.15)+"%";
    board.appendChild(p);
    cur.playerEl=p;
    positionPlayer(false);
  }

  function positionPlayer(hop){
    const {pos,size,playerEl} = cur;
    const cellPct = 100/size;
    playerEl.style.left = (cellPct*(pos.x+0.5))+"%";
    playerEl.style.top  = (cellPct*(pos.y+0.55))+"%";
    if(hop){
      playerEl.classList.remove("hop","hopf");
      void playerEl.offsetWidth;
      playerEl.classList.add("hop");
    }
  }

  function markClean(x,y,animate){
    const k=key(x,y);
    if(cur.cleaned.has(k)) return;
    cur.cleaned.add(k);
    cur.path.push(k);
    const cell=cur.cellEls[k];
    // keep start/goal tags but recolor
    cell.classList.add("clean");
    cell.classList.remove("floor");
    if(animate) sfxClean();
    refreshGoalGlow();
  }

  function refreshGoalGlow(){
    const {data} = cur;
    const goalCell = cur.cellEls[key(data.goal.x,data.goal.y)];
    if(!goalCell) return;
    const remaining = data.floorCount - cur.cleaned.size;
    // goal becomes "ready" when it's the last remaining floor cell
    const goalCleaned = cur.cleaned.has(key(data.goal.x,data.goal.y));
    if(!goalCleaned && remaining===1) goalCell.classList.add("ready");
    else goalCell.classList.remove("ready");
  }

  function updateHud(){
    const {data} = cur;
    hudProg.innerHTML = `<span class="done">${cur.cleaned.size}</span> / ${data.floorCount} 칸`;
    undoBtn.disabled = cur.path.length<=1;
  }

  /* ---------------- movement ---------------- */
  const DIRS = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };

  function tryMove(dir){
    if(!cur || animating) return;
    if($("#winOverlay").classList.contains("show")) return;
    const [dx,dy]=DIRS[dir];
    const nx=cur.pos.x+dx, ny=cur.pos.y+dy;
    const {data,size}=cur;

    // face direction
    if(dir==="left") cur.playerEl.classList.add("flip");
    else if(dir==="right") cur.playerEl.classList.remove("flip");

    // bounds
    if(nx<0||ny<0||nx>=size||ny>=size){ sfxBump(); return; }
    const t=data.grid[ny*size+nx];
    const nk=key(nx,ny);
    // crate
    if(t==="crate"){ bumpCell(nx,ny); sfxBump(); toast("📦 상자는 못 지나가요"); return; }
    // already cleaned
    if(cur.cleaned.has(nk)){ bumpCell(nx,ny); sfxBump(); toast("이미 닦은 칸이에요"); return; }
    // goal cell: only enter when it's the final remaining floor cell
    const isGoal = data.goal.x===nx && data.goal.y===ny;
    if(isGoal){
      const remaining = data.floorCount - cur.cleaned.size; // includes goal
      if(remaining>1){ bumpCell(nx,ny); sfxBump(); toast("아직 청소가 안 끝났어요!"); return; }
    }

    // do the move
    cur.pos={x:nx,y:ny};
    positionPlayer(true);
    markClean(nx,ny,true);
    updateHud();

    if(isGoal){ onWin(); return; }
    // stuck check
    if(!hasAnyMove()) setTimeout(()=>{ if(!isWon()) showStuck(); }, 260);
  }

  function hasAnyMove(){
    const {data,size}=cur;
    for(const d in DIRS){
      const [dx,dy]=DIRS[d];
      const nx=cur.pos.x+dx, ny=cur.pos.y+dy;
      if(nx<0||ny<0||nx>=size||ny>=size) continue;
      if(data.grid[ny*size+nx]==="crate") continue;
      const nk=key(nx,ny);
      if(cur.cleaned.has(nk)) continue;
      const isGoal = data.goal.x===nx && data.goal.y===ny;
      if(isGoal && (data.floorCount-cur.cleaned.size)>1) continue;
      return true;
    }
    return false;
  }

  function isWon(){ return cur && cur.cleaned.size===cur.data.floorCount; }

  function bumpCell(x,y){
    const cell=cur.cellEls[key(x,y)];
    if(!cell) return;
    cell.classList.remove("bump"); void cell.offsetWidth; cell.classList.add("bump");
  }

  /* ---------------- undo ---------------- */
  function undo(){
    if(!cur || animating) return;
    if(cur.path.length<=1) return;
    const lastK = cur.path.pop();
    cur.cleaned.delete(lastK);
    const cell=cur.cellEls[lastK];
    cell.classList.remove("clean");
    cell.classList.add("floor");
    const prevK = cur.path[cur.path.length-1];
    const [px,py]=prevK.split(",").map(Number);
    cur.pos={x:px,y:py};
    positionPlayer(true);
    refreshGoalGlow();
    updateHud();
    hideOverlays();
  }

  /* ---------------- win / stuck ---------------- */
  function starsFor(){
    // 3 stars if no undo used and solved; simplified: reward completion.
    // give 3 stars for a clean solve (we don't heavily penalize)
    return 3;
  }
  function onWin(){
    animating=true;
    sfxWin();
    const stars = starsFor();
    // save progress
    progress.stars[cur.stage] = Math.max(progress.stars[cur.stage]||0, stars);
    if(cur.stage>=progress.unlocked && cur.stage<TOTAL_STAGES)
      progress.unlocked = cur.stage+1;
    saveProgress(progress);
    buildStageGrid();
    $("#winStars").textContent = "★ ".repeat(stars).trim();
    const isLast = cur.stage>=TOTAL_STAGES;
    $("#winMsg").textContent = isLast ? "모든 창고를 청소했어요! 최고예요! 🏆" : "반짝반짝 깨끗해졌어요!";
    const nextBtn=$("#winNext");
    nextBtn.textContent = isLast ? "처음으로" : "다음 스테이지 →";
    setTimeout(()=>{ $("#winOverlay").classList.add("show"); animating=false; }, 380);
  }
  function showStuck(){ $("#stuckOverlay").classList.add("show"); }
  function hideOverlays(){
    $("#winOverlay").classList.remove("show");
    $("#stuckOverlay").classList.remove("show");
  }

  /* ---------------- input wiring ---------------- */
  document.addEventListener("keydown",(e)=>{
    if(!gameScreen.classList.contains("show")) return;
    const map={ArrowUp:"up",ArrowDown:"down",ArrowLeft:"left",ArrowRight:"right",
               w:"up",s:"down",a:"left",d:"right",W:"up",S:"down",A:"left",D:"right"};
    if(map[e.key]){ e.preventDefault(); tryMove(map[e.key]); }
    else if(e.key==="z"||e.key==="Z"){ undo(); }
  });

  document.querySelectorAll(".dbtn").forEach(b=>{
    const dir=b.dataset.dir;
    b.addEventListener("click",()=>tryMove(dir));
  });

  // swipe on board
  let touchStart=null;
  board.addEventListener("touchstart",(e)=>{
    const t=e.changedTouches[0]; touchStart={x:t.clientX,y:t.clientY};
  },{passive:true});
  board.addEventListener("touchend",(e)=>{
    if(!touchStart) return;
    const t=e.changedTouches[0];
    const dx=t.clientX-touchStart.x, dy=t.clientY-touchStart.y;
    const ax=Math.abs(dx), ay=Math.abs(dy);
    if(Math.max(ax,ay)<24){ touchStart=null; return; }
    if(ax>ay) tryMove(dx>0?"right":"left");
    else tryMove(dy>0?"down":"up");
    touchStart=null;
  },{passive:true});

  /* ---------------- buttons ---------------- */
  $("#backBtn").addEventListener("click",()=>{ hideOverlays(); showScreen("select"); });
  $("#restartBtn").addEventListener("click",()=>{ if(cur) startStage(cur.stage); });
  undoBtn.addEventListener("click",undo);

  $("#winNext").addEventListener("click",()=>{
    if(cur.stage>=TOTAL_STAGES){ hideOverlays(); showScreen("select"); }
    else startStage(cur.stage+1);
  });
  $("#winRetry").addEventListener("click",()=>{ startStage(cur.stage); });
  $("#stuckRetry").addEventListener("click",()=>{ startStage(cur.stage); });
  $("#stuckSelect").addEventListener("click",()=>{ hideOverlays(); showScreen("select"); });

  $("#resetProg").addEventListener("click",()=>{
    if(confirm("모든 진행 기록을 지울까요?")){
      progress={unlocked:1,stars:{}};
      saveProgress(progress);
      buildStageGrid();
    }
  });

  /* ---------------- boot ---------------- */
  buildStageGrid();
})();
</script>
</body>
</html>
